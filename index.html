<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<meta http-equiv="X-Frame-Options" content="DENY">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Exportação · Fu Song</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<style>
/* ── DARK THEME (default) ── */
:root {
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2d4a;
  --border:#1e2d45;--border2:#2a3f5f;
  --accent:#38BDF8;--accent2:#0EA5E9;--accent3:#7DD3FC;
  --green:#22C55E;--yellow:#F59E0B;--red:#EF4444;--purple:#818CF8;--orange:#FB923C;
  --text:#E2E8F0;--muted:#3D5470;--muted2:#64748B;--muted3:#94A3B8;
  --card-shadow:0 4px 24px rgba(0,0,0,0.5);
}
/* ── LIGHT THEME ── */
html.light {
  --bg:#F1F5F9;--bg2:#FFFFFF;--bg3:#F8FAFC;--bg4:#EFF6FF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --accent:#0284C7;--accent2:#0369A1;--accent3:#0EA5E9;
  --green:#15803D;--yellow:#B45309;--red:#DC2626;--purple:#4F46E5;--orange:#C2410C;
  --text:#0F172A;--muted:#94A3B8;--muted2:#475569;--muted3:#1E3A5F;
  --card-shadow:0 2px 16px rgba(0,0,0,0.06);
}
/* ── THEME TRANSITION ── */
*{transition:background-color 0.25s,border-color 0.25s,color 0.15s;}
input,select,button{transition:background-color 0.25s,border-color 0.25s,color 0.15s,box-shadow 0.15s;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;min-height:100vh;overflow-x:hidden;transition:background 0.25s,color 0.15s;}

/* ── SIDEBAR ── */
#sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);padding:24px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,0.15);}
.logo{margin-bottom:32px;padding:0 6px;}
.logo-mark{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:var(--accent);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.logo-mark span{background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
html.light .logo-mark span{background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
html.light .btn-primary{color:#fff;}
html.light input,html.light select,html.light textarea{background:#f8fbff;color:var(--text);border-color:var(--border2);}
html.light .kpi{background:var(--bg2);}
html.light #theme-toggle{box-shadow:0 2px 12px rgba(0,0,0,0.1);}
html.light,html.light body{background:#F1F5F9 !important;color:#0F172A;}
html.light #main{background:#F1F5F9;}
html.light #sidebar{background:#ffffff;border-right-color:#c8d8e8;}
html.light .card{background:var(--bg2);border-color:var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.07);}
html.light .proc-row{background:var(--bg2);border-color:var(--border);}
html.light .proc-row:hover{background:var(--bg3);}
html.light .nav-btn:hover{background:var(--bg3);}
html.light .nav-btn.active{background:linear-gradient(90deg,var(--bg3),var(--bg4));}
html.light .tabs{background:var(--bg3);}
html.light .tab.active{background:var(--bg2);}
html.light .tab{color:var(--muted2);}
html.light .total-box{background:var(--bg3);}
html.light .lucro-box{background:var(--bg3);}
html.light .doc-chip{background:var(--bg3);border-color:var(--border2);}
html.light .cf-step{background:var(--bg3);border-color:var(--border);}
html.light .report-card{background:var(--bg2);border-color:var(--border);}
html.light .report-card:hover{background:var(--bg3);}
html.light .track-row:hover{background:var(--bg3);}
html.light #dash-fab{box-shadow:0 4px 16px rgba(0,95,163,0.3);}
html.light .modal{background:var(--bg2);border-color:var(--border2);}
html.light ::-webkit-scrollbar-track{background:var(--bg3);}
html.light ::-webkit-scrollbar-thumb{background:var(--border2);}
.logo-sub{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;padding-left:28px;}
.nav-section{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:0 8px;margin:16px 0 6px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:var(--muted2);font-size:12.5px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;margin-bottom:2px;transition:all 0.15s;font-weight:500;position:relative;}
.nav-btn:hover{background:var(--bg3);color:var(--text);}
.nav-btn.active{background:var(--bg3);color:var(--accent2);font-weight:600;border-left:3px solid var(--accent2);padding-left:9px;}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:14px 8px 0;border-top:1px solid var(--border);}
.sf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sf-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
.sf-val{color:var(--accent);font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;}

/* ── MAIN ── */
#main{flex:1;padding:28px 24px;overflow-y:auto;max-width:100%;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:14px;box-shadow:var(--card-shadow);transition:border-color 0.15s;}
.card-click{cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.card-click:hover{border-color:var(--accent2);transform:translateY(-1px);}
.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title-left{display:flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--text);}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}

/* ── FIELDS ── */
.field{margin-bottom:10px;}
.field-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.field-val{color:var(--text);font-size:13px;line-height:1.4;}
.field-val.mono{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11.5px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.badge-emb{background:#0088ff22;color:#00d4ff;border:1px solid #0088ff44;}
.badge-porto{background:#ffb80022;color:#ffb800;border:1px solid #ffb80044;}
.badge-arm{background:#b388ff22;color:#b388ff;border:1px solid #b388ff44;}
.badge-col{background:#3d608022;color:#6a90b0;border:1px solid #3d608044;}
.badge-tipo{background:var(--bg3);color:var(--muted3);border:1px solid var(--border2);font-size:9px;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12.5px;font-family:'Inter',sans-serif;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent2);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,0.3);}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);color:var(--muted3);border:1px solid var(--border2);}
.btn-secondary:hover{color:var(--text);border-color:var(--muted);}
.btn-success{background:#00e5a018;color:var(--green);border:1px solid #00e5a033;}
.btn-success:hover{background:var(--green);color:#07101f;}
.btn-danger{background:#ff456018;color:var(--red);border:1px solid #ff456033;}
.btn-sm{padding:5px 12px;font-size:11.5px;}
.btn-xs{padding:3px 9px;font-size:11px;}

/* ── INPUTS ── */
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px #0088ff15;}
input[type=text],input[type=email],input[type=number]{max-length:500;}
label.lbl{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
.ig{margin-bottom:12px;}
select option{background:var(--bg2);}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.kpi:hover{border-color:var(--accent2);transform:translateY(-2px);}
.kpi-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.kpi-sub{color:var(--muted);font-size:10px;margin-top:5px;display:flex;justify-content:space-between;align-items:center;}

/* ── PROCESS ROW ── */
.proc-row{padding:14px 18px;border-radius:11px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:var(--bg2);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.proc-row:hover{border-color:var(--accent2);background:var(--bg3);transform:translateX(2px);}
.proc-id{font-family:'Outfit',sans-serif;font-weight:700;color:var(--accent);font-size:14px;margin-bottom:3px;}

/* ── COST ROWS ── */
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.cost-row:last-child{border-bottom:none;}
.c-label{color:var(--muted2);}
.c-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);}
.total-box{display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:8px;margin-top:10px;}

/* ── TRACK ROW ── */
.track-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 12px;border-bottom:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background 0.15s;gap:12px;}
.track-row:last-child{border-bottom:none;}
.track-row:hover{background:var(--bg3);}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;align-items:flex-start;padding:6px 0;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.tl-dot-done{background:var(--green);}
.tl-dot-active{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.tl-dot-pending{background:var(--border2);}
.tl-line{width:2px;background:var(--border);margin-left:4px;height:16px;}

/* ── DOC CHIPS ── */
.doc-grid{display:flex;flex-wrap:wrap;gap:8px;}
.doc-chip{padding:7px 13px;background:var(--bg);border:1px dashed var(--border2);border-radius:8px;color:var(--muted);font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.doc-chip:hover{border-color:var(--accent2);color:var(--accent);}
.doc-chip.has-doc{border-color:var(--green);border-style:solid;color:var(--green);}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--text);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:10px;width:fit-content;margin-bottom:16px;}
.tab{padding:7px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;transition:all 0.15s;}
.tab.active{background:var(--bg2);color:var(--accent);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.3);}

/* ── SECTION DIVIDER ── */
.sec-divider{display:flex;align-items:center;gap:10px;margin:18px 0 12px;}
.sec-divider-line{flex:1;height:1px;background:var(--border);}
.sec-divider-label{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;}

/* ── TRACKING CARD ── */
.track-status-bar{display:flex;align-items:center;gap:0;margin:12px 0;}
.tsb-step{flex:1;text-align:center;position:relative;}
.tsb-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 4px;position:relative;z-index:1;}
.tsb-line{position:absolute;top:6px;left:50%;right:-50%;height:2px;z-index:0;}
.tsb-label{font-size:9px;color:var(--muted);letter-spacing:0.5px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#07101f;padding:11px 20px;border-radius:9px;font-weight:700;font-size:13px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,229,160,0.3);}

/* ── LUCRO BOX ── */
.lucro-box{padding:14px 16px;border-radius:10px;background:var(--bg);margin-top:12px;}

/* ── CAMBIO FLOW ── */
.cambio-flow{display:flex;gap:0;margin:12px 0;}
.cf-step{flex:1;padding:12px;background:var(--bg);border:1px solid var(--border);text-align:center;}
.cf-step:first-child{border-radius:9px 0 0 9px;}
.cf-step:last-child{border-radius:0 9px 9px 0;}
.cf-arrow{display:flex;align-items:center;color:var(--muted);font-size:18px;padding:0 4px;}

/* ── REPORT BTN ── */
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;}
.report-card:hover{border-color:var(--accent2);background:var(--bg3);}

/* ── THEME TOGGLE ── */
#theme-toggle{
  position:fixed;top:16px;right:20px;z-index:600;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:7px 14px;
  cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;
  font-weight:600;color:var(--muted3);
  display:flex;align-items:center;gap:7px;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
  transition:all 0.2s;
}
#theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
.toggle-track{
  width:34px;height:18px;background:var(--border2);
  border-radius:20px;position:relative;transition:background 0.2s;
}
.toggle-track.on{background:var(--accent2);}
.toggle-thumb{
  width:14px;height:14px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left 0.2s;
}
.toggle-track.on .toggle-thumb{left:18px;}

/* ── CONTAINER INPUT ── */
.container-input{font-family:'JetBrains Mono',monospace;font-size:12px;}

/* ── CARGO PROGRESS ── */
.cargo-route{display:flex;align-items:center;gap:6px;margin-top:8px;}
.cargo-route-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);flex-shrink:0;}
.cargo-route-line{flex:1;height:2px;background:var(--border2);border-radius:2px;position:relative;}
.cargo-route-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.cargo-route-label{font-size:10px;color:var(--muted2);}

/* ── TRACK ROW ENHANCED ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

@keyframes spin{to{transform:rotate(360deg)}}
/* ── LOGIN SCREEN ── */
#login-screen{
  position:fixed;inset:0;background:#07101f;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
}
.login-box{
  background:#111827;border:1px solid #1e2d45;border-radius:16px;
  padding:40px 36px;text-align:center;max-width:380px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.login-logo{font-size:40px;margin-bottom:16px;}
.login-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;
  color:#E2E8F0;margin-bottom:6px;letter-spacing:-0.5px;}
.login-sub{color:#64748B;font-size:13px;margin-bottom:28px;line-height:1.5;}
.login-divider{border:none;border-top:1px solid #1e2d45;margin:20px 0;}
.login-footer{color:#3D5470;font-size:11px;margin-top:20px;}
@media(max-width:480px){
  .login-box{padding:28px 20px;border-radius:12px;}
  .login-title{font-size:18px;}
  .login-sub{font-size:12px;}
}
#login-error{color:#EF4444;font-size:12px;margin-top:12px;display:none;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(3,1fr);}
  .g4,.g5{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:800px){
  #dash-fab{left:72px!important;}
  #sidebar{width:56px;padding:16px 8px;}
  #sidebar .logo-area div[style*='background:#EFEFEF']{display:none;}
  .logo-sub,.nav-btn span:not(.nav-icon),.sidebar-footer .sf-label,.sidebar-footer .sf-val{display:none;}
  .nav-btn{justify-content:center;padding:10px 0;}
  #main{padding:16px 10px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .g3,.g4,.g5{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .modal{width:95%!important;max-width:95%!important;margin:10px;}
  .page-title{font-size:18px;}
  .card{padding:12px 10px;}
}
@media(max-width:480px){
  #sidebar{width:48px;padding:12px 6px;}
  .nav-btn{padding:10px 0;font-size:13px;}
  #main{padding:12px 8px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .g2,.g3,.g4,.g5{grid-template-columns:1fr;}
  .kpi{padding:10px 8px;}
  .kpi-val{font-size:18px;}
  .card{padding:10px 8px;border-radius:10px;}
  .page-title{font-size:16px;}
  .btn{padding:8px 12px;font-size:12px;}
  .btn-primary{padding:9px 16px;}
  .modal{width:98%!important;max-width:98%!important;padding:16px!important;margin:4px;}
  .tabs{gap:2px;}
  .tab{padding:7px 10px;font-size:11px;}
  .cambio-flow{flex-direction:column;gap:8px;}
  .cf-arrow{transform:rotate(90deg);}
}

// ═══════════════════════════════════════════════════════════
const ALLOWED_EMAILS = ['klismann.lai@gmail.com', 'lai@fusongmineradora.com'];

// Login attempt rate limiting
let _loginAttempts = 0;
let _loginBlockedUntil = 0;

function handleGoogleLogin(response) {
  // Rate limit: max 5 attempts per 5 minutes
  if(Date.now() < _loginBlockedUntil) {
    document.getElementById('login-error').textContent = '⏳ Muitas tentativas. Aguarde alguns minutos.';
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  _loginAttempts++;
  if(_loginAttempts > 5) {
    _loginBlockedUntil = Date.now() + (5 * 60 * 1000);
    _loginAttempts = 0;
  }
  try {
    // Decode JWT token from Google
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = (payload.email||'').toLowerCase().trim();
    const name = sanitize(payload.name||'Usuário');
    const picture = (payload.picture||'').startsWith('https://') ? payload.picture : '';
    // Validate token issuer
    if(!payload.iss || !payload.iss.includes('accounts.google.com')){
      document.getElementById('login-error').style.display='block';
      return;
    }

    if (!ALLOWED_EMAILS.includes(email.toLowerCase())) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }

    // Store session
    sessionStorage.setItem('erp-user', JSON.stringify({
      email, name, picture,
      expires: Date.now() + (8 * 60 * 60 * 1000) // 8 hours
    }));

    // Hide login, show ERP
    const ls = document.getElementById('login-screen');
    const mn = document.getElementById('main');
    if(ls) ls.style.display = 'none';
    if(mn) { mn.style.display = 'block'; mn.style.background = isLight ? '#F1F5F9' : '#0a0f1e'; }

    // Update sidebar with user info
    updateUserInfo(name, email, picture);

    // Init ERP
    applyTheme();
    nav('dashboard');

    // Setup and load from Google Sheets
    setTimeout(async () => {
      try {
        await setupSheets();
        await loadFromSheets();
      } catch(e) {
        console.warn('Sheets init:', e);
      }
    }, 1000);

  } catch(e) {
    // Login error handled silently
    document.getElementById('login-error').style.display = 'block';
  }
}

  if (footer) {
    const userDiv = document.createElement('div');
    userDiv.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-top:8px';
    const img = document.createElement('img');
    img.src = picture;
    img.style.cssText = 'width:28px;height:28px;border-radius:50%;flex-shrink:0';
    img.onerror = function(){ this.style.display='none'; };
    const info = document.createElement('div');
    info.style.cssText = 'min-width:0';
    info.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--muted3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+sanitize(name)+'</div>'
      + '<div style="font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+sanitize(email)+'</div>';
    userDiv.appendChild(img);
    userDiv.appendChild(info);
    footer.appendChild(userDiv);
  }
}

function checkSession() {
  const user = sessionStorage.getItem('erp-user');
  if (user) {
    try {
      const parsed = JSON.parse(user);
      if(parsed.expires && Date.now() > parsed.expires){
        sessionStorage.removeItem('erp-user');
        return false;
      }
      const {name, email, picture} = parsed;
      const lsc = document.getElementById('login-screen');
      const mnc = document.getElementById('main');
      if(lsc) lsc.style.display = 'none';
      if(mnc) { mnc.style.display = 'block'; mnc.style.background = isLight ? '#F1F5F9' : '#0a0f1e'; }
      updateUserInfo(name, email, picture);
      applyTheme();
      nav('dashboard');
      return true;
    } catch(e) {}
  }
  return false;
}

// ═══════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════
let isLight = localStorage.getItem('erp-theme') === 'light';

function applyTheme(){
  const html = document.documentElement;
  document.body.style.background = isLight ? '#F1F5F9' : '#0a0f1e';
  const main = document.getElementById('main');
  if(main) main.style.background = isLight ? '#F1F5F9' : '#0a0f1e';
  const sidebar = document.getElementById('sidebar');
  if(sidebar) sidebar.style.background = isLight ? '#FFFFFF' : '#111827';
  const track = document.getElementById('toggle-track');
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if(isLight){
    html.classList.add('light');
    if(track) track.classList.add('on');
    if(icon) icon.textContent = '🌙';
    if(label) label.textContent = 'Escuro';
  } else {
    html.classList.remove('light');
    if(track) track.classList.remove('on');
    if(icon) icon.textContent = '☀️';
    if(label) label.textContent = 'Claro';
  }
  localStorage.setItem('erp-theme', isLight ? 'light' : 'dark');
}

function toggleTheme(){
  isLight = !isLight;
  applyTheme();
}

// NAV + HISTORY
// ═══════════════════════════════════════════════════════════
const navHistory=[];

function nav(page,sub=null){
  if(S.page) navHistory.push({page:S.page,sub:S.sub,editMode:S.editMode,createMode:S.createMode,filter:S.filter,custosTab:S.custosTab,cambioTab:S.cambioTab,cadastroTab:S.cadastroTab,lancFiltro:S.lancFiltro});
  S.page=page; S.sub=sub; S.editMode=false; S.createMode=false; S.filter=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+page);
  if(nb) nb.classList.add('active');
  render(); updateSB();
}

function goBack(){
  if(navHistory.length===0) return;
  const prev=navHistory.pop();
  S.page=prev.page; S.sub=prev.sub; S.editMode=prev.editMode;
  S.createMode=prev.createMode; S.filter=prev.filter;
  S.custosTab=prev.custosTab||'processo'; S.cambioTab=prev.cambioTab||'lista'; S.cadastroTab=prev.cadastroTab||'clientes'; S.lancFiltro=prev.lancFiltro||'todos';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+S.page);
  if(nb) nb.classList.add('active');
  render(); updateSB();
}

const backBtn=()=>navHistory.length>0
  ? `<button class="btn btn-secondary btn-sm" onclick="goBack()" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:18px"><span style="font-size:15px">←</span> Voltar</button>`
  : '';

function render(){
  // reapply backgrounds after innerHTML changes
  document.body.style.background = isLight ? '#F1F5F9' : '#0a0f1e';
  const mainEl=document.getElementById('main');
  if(mainEl) mainEl.style.background = isLight ? '#F1F5F9' : '#0a0f1e';
  const fab=document.getElementById('dash-fab');
  if(fab) fab.style.display=S.page==='dashboard'?'none':'flex';
  const pages={dashboard:renderDashboard,processos:renderProcessos,rastreamento:renderRastreamento,cambio:renderCambio,custos:renderCustos,cadastro:renderCadastro,relatorios:renderRelatorios};
  const fn=pages[S.page];
  const mainEl2 = document.getElementById('main');
  if(mainEl2) mainEl2.style.display = 'block';
  if(fn) document.getElementById('main').innerHTML=fn();
  attachEvents();
  makeFabDraggable();
}

// Auto-fill cambio form from selected processo
function autoPreencherCambio(id){
  if(!id || id==='— Nenhum —') return;
  const p = S.processos.find(x=>x.id===id);
  if(!p) return;
  const setV = (eid,val)=>{ const el=document.getElementById(eid); if(el) el.value=val||''; };
  setV('nc_invoiceNum', p.invoiceNum);
  setV('nc_contratoNum', p.contratoNum);
  setV('nc_banco', p.cambioBanco||'Itaú');
  setV('nc_invoiceVal', p.cambioInvoice||'');
  setV('nc_taxa', p.cambioTaxa||'');
  setV('nc_fechamento', p.cambioFechamento||'');
  setV('nc_due', p.dueNumero||'');
  setV('nc_chave', p.dueChave||'');
  setV('nc_recebimento', p.cambioRecebimento||'');
  setV('nc_recebido', p.cambioRecebido||'');
  setV('nc_iof', p.cambioIOF||'');
  setV('nc_spread', p.cambioSpread||'');
  setV('nc_reais', p.cambioReais||'');
  setV('nc_status', p.cambioStatus||'Aguardando');
}

function renderCustos(){
  const tab=S.custosTab||'processo';
  const ps=S.processos;
  const totalC=ps.reduce((a,p)=>a+tc(p),0);
  const totalR=ps.reduce((a,p)=>a+(p.cambioReais||0),0);

  const tabsHtml=`<div class="tabs">
    <button class="tab ${tab==='processo'?'active':''}" onclick="S.custosTab='processo';render()">💸 Por Processo</button>
    <button class="tab ${tab==='fixos'?'active':''}" onclick="S.custosTab='fixos';render()">🏢 Custos Fixos</button>
    <button class="tab ${tab==='consolidado'?'active':''}" onclick="S.custosTab='consolidado';render()">📊 Consolidado</button>
    <button class="tab ${tab==='lancamentos'?'active':''}" onclick="S.custosTab='lancamentos';render()">💳 Lançamentos</button>
  </div>`;

  if(tab==='fixos'){
    const m=S.custosMensais[0]||{};
    const total=tcm(m);
    return `
    ${backBtn()}
    <div class="page-header"><div class="page-title">Custos</div><button class="btn btn-success btn-sm" onclick="gerarRelatorioMensal()">📑 PDF Mensal</button></div>
    ${tabsHtml}
    <div class="card">
      <div class="card-title"><div class="card-title-left">🏢 Custos Fixos Mensais — ${m.mes||'Mês atual'}</div></div>
      <div class="g3">
        ${[['Contador','contador'],['Aluguel Coworking','aluguel'],['Software','software'],['Internet','internet'],['Telefone','telefone'],['Impostos','impostos'],['Outros','outros']].map(([l,k])=>`
          <div class="ig"><label class="lbl">${l} (R$)</label><input type="number" value="${m[k]||0}" onchange="S.custosMensais[0]['${k}']=parseFloat(this.value)||0;updateSB()" /></div>`).join('')}
      </div>
      <div class="total-box">
        <span style="color:var(--muted)">Total Fixos do Mês</span>
        <span style="color:var(--yellow);font-family:'Outfit',sans-serif;font-weight:800;font-size:16px" id="total-fixos">R$ ${fmt(total)}</span>
      </div>
      <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--muted)">
        💡 Opção: ratear custos fixos por processo. <button class="btn btn-secondary btn-xs" style="margin-left:8px">Ratear por Processo</button>
      </div>
    </div>`;
  }

  if(tab==='consolidado'){
    const totalFixos=S.custosMensais.reduce((a,m)=>a+tcm(m),0);
    const totalGeral=totalC+totalFixos;
    const lucroGeral=totalR-totalGeral;
    return `
    ${backBtn()}
    <div class="page-header"><div class="page-title">Custos</div><button class="btn btn-success btn-sm" onclick="gerarRelatorioFinanceiro()">📑 PDF Financeiro</button></div>
    ${tabsHtml}
    <div class="card">
      <div class="card-title"><div class="card-title-left">📊 Consolidado Geral</div></div>
      <div class="g4">
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Receita Total</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--green)">R$ ${fmt(totalR)}</div></div>
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Custos Variáveis</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--yellow)">R$ ${fmt(totalC)}</div></div>
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Custos Fixos</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--orange)">R$ ${fmt(totalFixos)}</div></div>
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Lucro Líquido</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:${lucroGeral>=0?'var(--green)':'var(--red)'}">R$ ${fmt(lucroGeral)}</div></div>
      </div>
    </div>
    ${ps.map(p=>{
      const c=tc(p); const l=(p.cambioReais||0)-c;
      return `<div class="card"><div class="card-title"><div class="card-title-left">${p.id} — ${p.produto}</div>${badge(p.status)}</div>
      <div class="g3">
        <div class="total-box"><span style="color:var(--muted);font-size:11px">Custos</span><span style="color:var(--yellow);font-family:'Outfit',sans-serif;font-weight:700">R$ ${fmt(c)}</span></div>
        <div class="total-box"><span style="color:var(--muted);font-size:11px">Receita</span><span style="color:var(--green);font-family:'Outfit',sans-serif;font-weight:700">R$ ${fmt(p.cambioReais)}</span></div>
        <div class="total-box"><span style="color:var(--muted);font-size:11px">Lucro</span><span style="color:${l>=0?'var(--green)':'var(--red)'};font-family:'Outfit',sans-serif;font-weight:700">R$ ${fmt(l)}</span></div>
      </div></div>`;}).join('')}`;
  }

  if(tab==='lancamentos') return renderLancamentos(backBtn(),tabsHtml);

  return `
  ${backBtn()}
  <div class="page-header"><div class="page-title">Custos</div><button class="btn btn-success btn-sm" onclick="gerarRelatorioMensal()">📑 PDF Mensal</button></div>
  ${tabsHtml}
  ${ps.map(p=>{
    const c=tc(p);
    return `<div class="card">
      <div class="card-title"><div class="card-title-left">💸 ${p.id} — ${p.produto}</div>${badge(p.status)}</div>
      <div class="g3">
        ${[['Marítimo',p.custoMaritimo],['Frete Rodoviário',p.custoFrete],['Certificado de Origem',p.custoCertificado],['Armazém',p.custoArmazem],['Porto / Taxas',p.custoPorto],['Despachante',p.custoDespachante],['Serviços de Terceiros',p.custoServTerceiros],['Impostos',p.custoImpostos],['Produto',p.custoProduto]].map(([l,v])=>`
          <div class="cost-row"><span class="c-label">${l}</span><span class="c-val">R$ ${fmt(v)}</span></div>`).join('')}
      </div>
      <div class="total-box" style="margin-top:8px">
        <span style="color:var(--muted)">Total do Processo</span>
        <span style="color:var(--yellow);font-family:'Outfit',sans-serif;font-weight:800;font-size:15px">R$ ${fmt(c)}</span>
      </div>
    </div>`;}).join('')}`;
}

function renderCadastro(){
  const tab = S.cadastroTab;
  const tipos = ['clientes','transportadoras','despachantes','agentes','armazens','servicos'];
  const labels = {
    'clientes':'🏢 Clientes',
    'transportadoras':'🚚 Transportadoras',
    'despachantes':'📋 Despachantes',
    'agentes':'🚢 Agentes de Carga',
    'armazens':'🏭 Armazéns',
    'servicos':'🔧 Serviços de Terceiros'
  };
  const tipoMap = {
    'transportadoras':'Transportadora',
    'despachantes':'Despachante',
    'agentes':'Agente de Carga',
    'armazens':'Armazém',
    'servicos':'Serviço de Terceiros'
  };

  const tabsHtml = `<div style="display:flex;flex-wrap:wrap;gap:4px;background:var(--bg3);padding:4px;border-radius:10px;margin-bottom:16px">
    ${tipos.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="S.cadastroTab='${t}';render()">${labels[t]}</button>`).join('')}
  </div>`;

  const clientesHtml = S.clientes.length === 0
    ? `<div class="card" style="text-align:center;padding:30px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:10px">🏢</div>
        <div>Nenhum cliente cadastrado ainda.</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="abrirModalCadastro('cliente')">+ Adicionar Cliente</button>
      </div>`
    : S.clientes.map((c,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="font-family:'Outfit',sans-serif;font-weight:700;color:var(--accent);font-size:14px">${escHtml(c.nome)}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge badge-emb">Cliente</span>
            <button class="btn btn-secondary btn-xs" onclick="editarCadastro('cliente',${i})">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="excluirCadastro('cliente',${i})">🗑️</button>
          </div>
        </div>
        <div class="g2">${F('USCI',c.usci,true)}${F('TEL',c.tel)}${F('E-MAIL',c.email)}${F('Endereço',c.end)}</div>
      </div>`).join('');

  const fornHtml = (tipo) => {
    const lista = S.fornecedores.filter(f=>f.tipo===tipo);
    if(lista.length === 0) return `
      <div class="card" style="text-align:center;padding:30px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:10px">${{Transportadora:'🚚',Despachante:'📋','Agente de Carga':'🚢','Armazém':'🏭','Serviço de Terceiros':'🔧'}[tipo]||'🗂️'}</div>
        <div>Nenhum ${tipo.toLowerCase()} cadastrado ainda.</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="abrirModalCadastro('fornecedor','${tipo}')">+ Adicionar ${tipo}</button>
      </div>`;
    return lista.map((f,i)=>{
      const realIdx = S.fornecedores.indexOf(f);
      return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="font-family:'Outfit',sans-serif;font-weight:700;color:var(--accent);font-size:14px">${escHtml(f.nome)}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge badge-tipo">${escHtml(f.tipo)}</span>
            <button class="btn btn-secondary btn-xs" onclick="editarCadastro('fornecedor',${realIdx})">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="excluirCadastro('fornecedor',${realIdx})">🗑️</button>

        ${f.pix?F('PIX',f.pix,true):''}
        ${F('Endereço',f.end)}
      </div>`;
    }).join('');
  };

  const tipo = tipoMap[tab] || '';

  return `
  ${backBtn()}
  <div class="page-header">
    <div class="page-title">Cadastro</div>
    <button class="btn btn-primary" id="btn-novo-cadastro">+ Novo</button>
  </div>
  ${tabsHtml}
  ${tab==='clientes' ? clientesHtml : fornHtml(tipo)}`;
}

function abrirModalCadastro(kind, tipo='', idx=null){
  const existing = document.getElementById('cad-modal');
  if(existing) existing.remove();

  const isEdit = idx !== null;
  const reg = isEdit ? (kind==='cliente' ? S.clientes[idx] : S.fornecedores[idx]) : {};
  const v = k => escHtml(String(reg[k]||''));
  const tipoLabel = kind==='cliente' ? 'Cliente' : (tipo||'Fornecedor');

  const modal = document.createElement('div');
  modal.id = 'cad-modal';
  modal.className = 'modal-overlay';
  modal.dataset.kind = kind;
  modal.dataset.tipo = tipo;
  modal.dataset.idx = idx !== null ? String(idx) : '';

  const clienteForm = `
    <div class="ig"><label class="lbl">Nome / Razão Social *</label>
      <input type="text" id="cad_nome" value="${v('nome')}" placeholder="Ex: Xiamen Trading Co., Ltd"/></div>

      <div class="ig"><label class="lbl">USCI</label>

      <div class="ig"><label class="lbl">TEL</label>
        <input type="text" id="cad_tel" value="${v('tel')}" placeholder="+55 (11) 99999-9999"/></div>
    </div>
    <div class="ig"><label class="lbl">E-MAIL</label>
      <input type="email" id="cad_email" value="${v('email')}" placeholder="contato@empresa.com"/></div>
    <div class="ig"><label class="lbl">Endereço</label>
      <input type="text" id="cad_end" value="${v('end')}" placeholder="Rua, número, cidade, país"/></div>`;

  const fornecedorForm = `
    <div class="ig"><label class="lbl">Nome / Razão Social *</label>
      <input type="text" id="cad_nome" value="${v('nome')}" placeholder="Ex: Italiana Transportes LTDA"/></div>
    <div class="g2">
      <div class="ig"><label class="lbl">CNPJ</label>

function salvarCadastro(){
  const modal = document.getElementById('cad-modal');
  if(!modal) return;
  const kind = modal.dataset.kind;
  const tipo = modal.dataset.tipo;
  const idxStr = modal.dataset.idx;
  const idx = idxStr !== '' ? parseInt(idxStr) : null;
  const gv = id => { const el=document.getElementById(id); return el ? sanitize(el.value) : ''; };

  const nome = gv('cad_nome');
  if(!nome){ alert('Informe o nome/razão social.'); return; }

  if(kind === 'cliente'){
    const obj = { nome, usci:gv('cad_usci'), tel:gv('cad_tel'), email:gv('cad_email'), end:gv('cad_end') };
    if(idx !== null) S.clientes[idx] = {...S.clientes[idx], ...obj};
    else { obj.id = Date.now(); S.clientes.push(obj); }
  } else {
    const obj = {
      nome, tipo,
      cnpj:gv('cad_cnpj'), ie:gv('cad_ie'), cep:gv('cad_cep'),
      email:gv('cad_email'), end:gv('cad_end'),
      banco:gv('cad_banco'), agencia:gv('cad_agencia'), conta:gv('cad_conta'),
      pix:gv('cad_pix')
    };
    if(idx !== null) S.fornecedores[idx] = {...S.fornecedores[idx], ...obj};
    else { obj.id = Date.now(); S.fornecedores.push(obj); }
  }

  modal.remove();
  showToast();
  scheduleAutoSave();
  render();
}

function editarCadastro(kind, idx){
  const tipo = kind==='cliente' ? '' : S.fornecedores[idx].tipo;
  abrirModalCadastro(kind, tipo, idx);
}

function excluirCadastro(kind, idx){
  const nome = kind==='cliente' ? S.clientes[idx]?.nome : S.fornecedores[idx]?.nome;
  if(!confirm('Excluir "'+nome+'"? Esta ação não pode ser desfeita.')) return;
  if(kind==='cliente') S.clientes.splice(idx,1);
  else S.fornecedores.splice(idx,1);
  showToast();
  render();
}

function salvarLancamento(idx){
  const getV = id => { const el=document.getElementById(id); return el ? sanitize(el.value) : ''; };
  const getTipo = () => { const el=document.getElementById('lf_tipo'); return el ? el.value : 'Despesa'; };
  const getUrl = id => { const el=document.getElementById(id); return el ? sanitizeUrl(el.value) : ''; };

  const vinculo = getV('lf_vinculo');
  const processoSel = getV('lf_vinculoProcesso');
  const vinculoId = vinculo==='processo' && processoSel ? processoSel :
                    vinculo==='cadastro' ? getV('lf_empresa') :
                    vinculo==='fixo' ? 'Custo Fixo Mensal' : '';

  const obj = {
    tipo: getTipo(),
    status: getV('lf_status'),
    descricao: getV('lf_descricao'),
    valor: parseFloat(document.getElementById('lf_valor')?.value)||0,
    data: getV('lf_data'),
    empresa: getV('lf_empresa'),
    categoria: getV('lf_categoria'),
    vinculo,
    vinculoId: sanitize(vinculoId),
    observacao: getV('lf_observacao'),
    docs:{
      comprovante: getUrl('lf_comprovante'),
      fatura: getUrl('lf_fatura'),
      nfe: getUrl('lf_nfe'),
      nfeChave: getV('lf_nfeChave'),
      outros: getUrl('lf_outros'),
    }
  };

  if(!obj.descricao){ alert('Informe a descrição do lançamento.'); return; }
  if(!obj.valor || obj.valor<=0){ alert('Informe um valor válido maior que zero.'); return; }

  if(idx!==null && idx!==undefined && idx!=='null'){
    obj.id = S.lancamentos[idx].id;
    S.lancamentos[idx] = obj;
  } else {
    obj.id = Date.now();
    if(!S.lancamentos) S.lancamentos = [];
    S.lancamentos.unshift(obj);
  }

  document.getElementById('lanc-modal').remove();
  S.custosTab = 'lancamentos';
  showToast(); render();
}

function editarLancamento(idx){
  abrirModalLancamento(idx);
}

function excluirLancamento(idx){
  if(!confirm('Excluir este lançamento?')) return;
  S.lancamentos.splice(idx,1);
  showToast(); render();
}

function abrirDocLanc(idx, docKey){
  const l = S.lancamentos[idx];
  if(!l) return;
  const hasDoc = l.docs && l.docs[docKey] && l.docs[docKey].length>0;
  if(hasDoc){ window.open(sanitizeUrl(l.docs&&l.docs[docKey]?l.docs[docKey]:''),'_blank'); return; }
  abrirModalLancamento(idx);
}

// PDF dispatcher
function gerarPDF(id) {
  const map = {
    'embarque':       gerarRelatorioEmbarque,
    'mensal':         gerarRelatorioMensal,
    'financeiro':     gerarRelatorioFinanceiro,
    'cambio':         gerarExtratoCambio,
    'contabilidade':  gerarRelatorioContabilidade,
  };
  const fn = map[id];
  if (!fn) { showToast('⚠️ Relatório não encontrado'); return; }
  if (!window.jspdf) { showToast('⚠️ Biblioteca PDF não carregou. Recarregue a página.'); return; }
  try { fn(); } catch(e) { showToast('⚠️ Erro ao gerar PDF: ' + e.message); }
}

// PDF GENERATORS
// ═══════════════════════════════════════════════════════════
function initPDF(){
  if(!window.jspdf){
    showToast('⚠️ Biblioteca PDF não carregou. Recarregue a página.');
    throw new Error('jsPDF not loaded');
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  // White background for readability
  doc.setFillColor(255,255,255);
  doc.rect(0,0,210,297,'F');
  // Header bar
  doc.setFillColor(14,165,233);
  doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('Fu Song - Gestão de Exportação',14,14);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text(new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}),196,14,'right');
  doc.setDrawColor(226,232,240);
  doc.setLineWidth(0.3);
  return doc;
}

function pdfHeader(doc,title,subtitle){
  doc.setTextColor(15,23,42);
  doc.setFontSize(16);
  doc.setFont('helvetica','bold');
  doc.text(title,14,34);
  doc.setTextColor(100,116,139);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text(subtitle,14,41);
  doc.text('Gerado em: '+new Date().toLocaleString('pt-BR'),196,41,'right');
  doc.setDrawColor(226,232,240);
  doc.line(14,45,196,45);
  return 52;
}

function pdfSection(doc,label,y){
  // Section background
  doc.setFillColor(240,249,255);
  doc.rect(14,y-4,182,8,'F');
  doc.setTextColor(14,165,233);
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');
  doc.text(label.toUpperCase(),16,y+1);
  doc.setDrawColor(186,230,253);
  doc.line(14,y+4,196,y+4);
  return y+12;
}

function pdfRow(doc,label,val,y,color=[51,65,85]){
  // Alternating row backgrounds
  doc.setTextColor(71,85,105);
  doc.setFontSize(8.5);
  doc.setFont('helvetica','normal');
  doc.text(String(label),16,y);
  doc.setTextColor(...color);
  doc.setFont('helvetica','bold');
  doc.text(String(val),130,y,'right');
  doc.setDrawColor(241,245,249);
  doc.line(14,y+2,196,y+2);
  return y+7;
}

function pdfTotal(doc,label,val,y,color=[14,165,233]){
  doc.setFillColor(248,250,252);
  doc.rect(14,y-4,182,10,'F');
  doc.setTextColor(15,23,42);
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');
  doc.text(label,16,y+2);
  doc.setTextColor(...color);
  doc.text(String(val),194,y+2,'right');
  return y+14;
}

function pdfNewPage(doc){
  doc.addPage();
  doc.setFillColor(14,165,233);
  doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('Fu Song - Gestão de Exportação',14,14);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text('continuação...',196,14,'right');
  return 30;
}

function gerarRelatorioEmbarque(id=null){
  const ps = id ? S.processos.filter(p=>p.id===id) : S.processos;
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório de Embarques','Detalhamento de embarques realizados');

  ps.forEach((p,i)=>{
    if(y>250){ y=pdfNewPage(doc); }
    y = pdfSection(doc, `Embarque ${p.embarque||i+1} · Processo ${p.id}`, y);
    y = pdfRow(doc,'Processo',p.id,y,[14,165,233]);
    y = pdfRow(doc,'Produto / Commodity',p.produto||'—',y);
    y = pdfRow(doc,'Porto de Origem (POL)',p.pol||'—',y);
    y = pdfRow(doc,'Container(s)',(p.containers&&p.containers.length>1?p.containers.join(', '):p.container)||'—',y,[14,165,233]);
    y = pdfRow(doc,'Quantidade de Containers',p.qtdContainer||'1',y);
    y = pdfRow(doc,'Nº Booking',p.booking||'—',y,[14,165,233]);
    y = pdfRow(doc,'Porto de Destino (POD)',p.pod||'—',y);
    y = pdfRow(doc,'Saída do Navio',p.saida||'—',y);
    y = pdfRow(doc,'Dead Line Carga',p.deadlineCarga||'—',y);
    y = pdfRow(doc,'Dead Line Draft',p.deadlineDraft||'—',y);
    y = pdfRow(doc,'Companhia Marítima',p.companhia||'—',y);
    y = pdfRow(doc,'Status',p.status||'—',y,[22,197,160]);
    y = pdfRow(doc,'Peso',p.peso||'—',y);
    y = pdfRow(doc,'Cliente / Consignee',p.cliente||'—',y);
    y += 4;
  });

  doc.save(`Embarques_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function gerarRelatorioMensal(){
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório Mensal de Custos','Custos variáveis por processo e fixos mensais');
  const m = S.custosMensais[0]||{};

  y = pdfSection(doc,'CUSTOS VARIÁVEIS POR PROCESSO', y);
  S.processos.forEach(p=>{
    if(y>240){ y=pdfNewPage(doc); }
    y = pdfSection(doc, p.id+' — '+(p.produto||''), y);
    const items = [
      ['Marítimo',p.custoMaritimo,p.custoMaritimo_status],
      ['Frete Rodoviário',p.custoFrete,p.custoFrete_status],
      ['Certificado de Origem',p.custoCertificado,p.custoCertificado_status],
      ['Armazém',p.custoArmazem,p.custoArmazem_status],
      ['Porto / Taxas',p.custoPorto,p.custoPorto_status],
      ['Despachante',p.custoDespachante,p.custoDespachante_status],
      ['Serviços de Terceiros',p.custoServTerceiros,p.custoServTerceiros_status],
      ['Impostos',p.custoImpostos,p.custoImpostos_status],
      ['Custo do Produto',p.custoProduto,p.custoProduto_status],
    ];
    items.forEach(([l,v,st])=>{
      if((v||0)>0){
        const statusColor = st==='Pago'?[22,163,74]:st==='Pendente'?[220,38,38]:[100,116,139];
        y = pdfRow(doc, l+' ('+( st||'Estimativa')+')', 'R$ '+fmt(v), y, statusColor);
      }
    });
    y = pdfTotal(doc,'Total do Processo','R$ '+fmt(tc(p)),y,[14,165,233]);
  });

  if(y>230){ y=pdfNewPage(doc); }
  y = pdfSection(doc,'CUSTOS FIXOS MENSAIS', y);
  [['Contador',m.contador],['Aluguel Coworking',m.aluguel],['Software',m.software],
   ['Internet',m.internet],['Telefone',m.telefone],['Impostos',m.impostos],['Outros',m.outros]
  ].forEach(([l,v])=>{ if((v||0)>0) y=pdfRow(doc,l,'R$ '+fmt(v),y,[251,146,60]); });
  y = pdfTotal(doc,'Total Fixos Mensais','R$ '+fmt(tcm(m)),y,[251,146,60]);

  doc.save(`Custos_Mensal_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function gerarRelatorioFinanceiro(){
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório Financeiro','Balanço por processo e consolidado geral');

  S.processos.forEach(p=>{
    if(y>240){ y=pdfNewPage(doc); }
    y = pdfSection(doc, p.id+' — '+(p.produto||''), y);
    y = pdfRow(doc,'Cliente',p.cliente||'—',y);
    y = pdfRow(doc,'Saída',p.saida||'—',y);
    y = pdfRow(doc,'Invoice','USD '+fmt(p.cambioInvoice),y,[14,165,233]);
    y = pdfRow(doc,'Taxa Cambial','R$ '+(p.cambioTaxa||0).toFixed(4),y);
    y = pdfRow(doc,'Receita (R$)','R$ '+fmt(p.cambioReais),y,[22,163,74]);
    y = pdfRow(doc,'IOF','R$ '+fmt(p.cambioIOF),y,[220,38,38]);
    y = pdfRow(doc,'Spread','R$ '+fmt(p.cambioSpread),y,[220,38,38]);
    y = pdfRow(doc,'Total Custos','R$ '+fmt(tc(p)),y,[245,158,11]);
    const lucro = (p.cambioReais||0)-tc(p);
    y = pdfTotal(doc,'Lucro Operacional','R$ '+fmt(lucro),y,lucro>=0?[22,163,74]:[220,38,38]);
  });

  if(y>230){ y=pdfNewPage(doc); }
  const totalC=S.processos.reduce((a,p)=>a+tc(p),0);
  const totalR=S.processos.reduce((a,p)=>a+(p.cambioReais||0),0);
  const lucroTotal=totalR-totalC;
  y = pdfSection(doc,'CONSOLIDADO GERAL', y);
  y = pdfRow(doc,'Receita Total','R$ '+fmt(totalR),y,[22,163,74]);
  y = pdfRow(doc,'Custos Totais Variáveis','R$ '+fmt(totalC),y,[245,158,11]);
  y = pdfTotal(doc,'Lucro Operacional Total','R$ '+fmt(lucroTotal),y,lucroTotal>=0?[22,163,74]:[220,38,38]);

  doc.save(`Financeiro_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function gerarRelatorioContabilidade(){
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório de Contabilidade','Todas as entradas e saídas — para o contador');
  const m = S.custosMensais[0]||{};
  const totalR = S.processos.reduce((a,p)=>a+(p.cambioReais||0),0);
  const totalC = S.processos.reduce((a,p)=>a+tc(p),0);
  const totalF = tcm(m);
  const totalLanc = (S.lancamentos||[]).filter(l=>l.tipo==='Receita').reduce((a,l)=>a+(l.valor||0),0);
  const totalLancSaida = (S.lancamentos||[]).filter(l=>l.tipo==='Despesa').reduce((a,l)=>a+(l.valor||0),0);

  y = pdfSection(doc,'ENTRADAS — Câmbio Recebido por Processo', y);
  S.processos.forEach(p=>{
    if(y>250){ y=pdfNewPage(doc); }
    y = pdfRow(doc,p.id+' — '+(p.produto||'')+(p.cambioRecebimento?' ('+p.cambioRecebimento+')':''),'R$ '+fmt(p.cambioReais),y,[22,163,74]);
  });
  if(totalLanc>0){
    y = pdfRow(doc,'Outras receitas (lançamentos)','R$ '+fmt(totalLanc),y,[22,163,74]);
  }
  y = pdfTotal(doc,'TOTAL ENTRADAS','R$ '+fmt(totalR+totalLanc),y,[22,163,74]);

  if(y>220){ y=pdfNewPage(doc); }
  y = pdfSection(doc,'SAÍDAS — Custos Variáveis por Processo', y);
  S.processos.forEach(p=>{
    if(y>250){ y=pdfNewPage(doc); }
    y = pdfRow(doc,p.id+' — '+(p.produto||''),'R$ '+fmt(tc(p)),y,[245,158,11]);
    [['Marítimo',p.custoMaritimo],['Frete',p.custoFrete],['Certificado',p.custoCertificado],
     ['Armazém',p.custoArmazem],['Porto',p.custoPorto],['Despachante',p.custoDespachante],
     ['Serv. Terceiros',p.custoServTerceiros],['Impostos',p.custoImpostos],['Produto',p.custoProduto]
    ].forEach(([l,v])=>{ if((v||0)>0) y=pdfRow(doc,'  '+l,'R$ '+fmt(v),y,[100,116,139]); });
  });
  y = pdfTotal(doc,'Total Variáveis','R$ '+fmt(totalC),y,[245,158,11]);

  if(y>220){ y=pdfNewPage(doc); }
  y = pdfSection(doc,'SAÍDAS — Custos Fixos Mensais', y);
  [['Contador',m.contador],['Aluguel Coworking',m.aluguel],['Software',m.software],
   ['Internet',m.internet],['Telefone',m.telefone],['Impostos',m.impostos],['Outros',m.outros]
  ].forEach(([l,v])=>{ if((v||0)>0) y=pdfRow(doc,l,'R$ '+fmt(v),y,[251,146,60]); });
  y = pdfTotal(doc,'Total Fixos','R$ '+fmt(totalF),y,[251,146,60]);

  if((S.lancamentos||[]).length>0){
    if(y>210){ y=pdfNewPage(doc); }
    y = pdfSection(doc,'LANÇAMENTOS AVULSOS', y);
    (S.lancamentos||[]).forEach(l=>{
      if(y>250){ y=pdfNewPage(doc); }
      const cor = l.tipo==='Receita'?[22,163,74]:l.tipo==='Despesa'?[220,38,38]:[100,116,139];
      y = pdfRow(doc,(l.data?l.data+' · ':'')+l.descricao+(l.empresa?' ('+l.empresa+')':''),
        (l.tipo==='Despesa'?'- ':'+ ')+'R$ '+fmt(l.valor),y,cor);
    });
  }

  if(y>220){ y=pdfNewPage(doc); }
  y = pdfSection(doc,'RESULTADO DO PERÍODO', y);
  const totalEntradas = totalR+totalLanc;
  const totalSaidas   = totalC+totalF+totalLancSaida;
  const resultado     = totalEntradas-totalSaidas;
  y = pdfRow(doc,'Total Entradas','R$ '+fmt(totalEntradas),y,[22,163,74]);
  y = pdfRow(doc,'Total Saídas','R$ '+fmt(totalSaidas),y,[220,38,38]);
  y = pdfTotal(doc,'RESULTADO LÍQUIDO DO PERÍODO','R$ '+fmt(resultado),y,resultado>=0?[22,163,74]:[220,38,38]);

  doc.save(`Contabilidade_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function anexarDoc(processId,docKey){
  // Remove any existing modal
  const existing=document.getElementById('doc-modal');
  if(existing) existing.remove();

  const docLabels={invoice:'Invoice',contrato:'Contrato',packingList:'Packing List',
    bl:'BL - Bill of Lading',due:'DU-E',nfe:'NF-e',comprovantes:'Comprovantes',certOrigem:'Certificado de Origem'};
  const label=docLabels[docKey]||docKey;

  // Build modal without nested template literals to avoid syntax issues
  const modal=document.createElement('div');

function makeFabDraggable() {
  const fab = document.getElementById('dash-fab');
  if (!fab || fab._draggable) return;
  fab._draggable = true;
  let dragging = false, startX, startY, origX, origY;

  const onDown = (e) => {
    dragging = false;
    const touch = e.touches ? e.touches[0] : e;
    startX = touch.clientX; startY = touch.clientY;
    const rect = fab.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    fab.style.transition = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onUp);
  };

  const onMove = (e) => {
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      dragging = true;
      if (e.cancelable) e.preventDefault();
    }
    if (!dragging) return;
    const newX = Math.max(0, Math.min(window.innerWidth - fab.offsetWidth, origX + dx));
    const newY = Math.max(0, Math.min(window.innerHeight - fab.offsetHeight, origY + dy));
    fab.style.position = 'fixed';
    fab.style.left = newX + 'px';
    fab.style.top = newY + 'px';
    fab.style.bottom = 'auto';
    localStorage.setItem('fab-pos', JSON.stringify({left: newX, top: newY}));
  };

  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    fab.style.transition = '';
    if (!dragging) nav('dashboard');
  };

  fab.addEventListener('mousedown', onDown);
  fab.addEventListener('touchstart', onDown, {passive:true});

  // Restore saved position
  try {
    const saved = JSON.parse(localStorage.getItem('fab-pos'));
    if (saved) {
      fab.style.position = 'fixed';
      fab.style.left = saved.left + 'px';
      fab.style.top = saved.top + 'px';
      fab.style.bottom = 'auto';
    }
  } catch(e) {}
}

// Get current OAuth token from Google Identity Services
function getAccessToken() {
  return new Promise((resolve, reject) => {
    const user = sessionStorage.getItem('erp-user');
    if (!user) { reject('Not logged in'); return; }
    // Use GIS token client for Sheets scope
    if (window._sheetsToken && window._sheetsTokenExpiry > Date.now()) {
      resolve(window._sheetsToken);
      return;
    }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: '69223242564-l80vfi8s0i58tf4b6jumrbvt82mdjlik.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
      callback: (resp) => {
        if (resp.error) { reject(resp.error); return; }
        window._sheetsToken = resp.access_token;
        window._sheetsTokenExpiry = Date.now() + (resp.expires_in * 1000) - 60000;
        resolve(resp.access_token);
      },
    });
    client.requestAccessToken({prompt: ''});
  });
}

// Generic Sheets API call
async function sheetsAPI(method, endpoint, body=null) {
  const token = await getAccessToken();
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SHEETS_API + endpoint, opts);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Sheets API error');
  }
  return res.json();
}

async function loadFromSheets() {
  try {
    showSyncIndicator('Carregando dados...');
    const ranges = ['PROCESSOS', 'CLIENTES', 'FORNECEDORES', 'LANCAMENTOS', 'CUSTOS_FIXOS'];
    const res = await sheetsAPI('GET',
      `/${SHEET_ID}/values:batchGet?ranges=${ranges.join('&ranges=')}&majorDimension=ROWS`
    );
    const parse = (vr) => {
      if (!vr?.values || vr.values.length < 2) return [];
      const headers = vr.values[0];
      return vr.values.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = row[i] || ''; });
        return obj;
      });
    };
    const [proc, cli, forn, lanc, fixos] = res.valueRanges.map(parse);
    // Parse numeric fields in processos
    proc.forEach(p => {
      ['custoMaritimo','custoFrete','custoCertificado','custoArmazem','custoPorto',
       'custoDespachante','custoServTerceiros','custoImpostos','custoProduto',
       'cambioInvoice','cambioTaxa','cambioReais','cambioIOF','cambioSpread','cambioRecebido'
      ].forEach(k => { p[k] = parseFloat(p[k]) || 0; });
      if (p.containers && typeof p.containers === 'string') {
        try { p.containers = JSON.parse(p.containers); } catch(e) { p.containers = [p.container||'']; }
      }
      if (p.docs && typeof p.docs === 'string') {
        try { p.docs = JSON.parse(p.docs); } catch(e) { p.docs = {}; }
      } else if (!p.docs) { p.docs = {}; }
    });
    lanc.forEach(l => { l.valor = parseFloat(l.valor) || 0; });
    fixos.forEach(m => {
      ['contador','aluguel','software','internet','telefone','impostos','outros'
      ].forEach(k => { m[k] = parseFloat(m[k]) || 0; });
    });
    if (proc.length > 0) S.processos = proc;
    if (cli.length > 0) S.clientes = cli;
    if (forn.length > 0) S.fornecedores = forn;
    if (lanc.length > 0) S.lancamentos = lanc;
    if (fixos.length > 0) S.custosMensais = fixos;
    hideSyncIndicator();
    render();
  } catch(e) {
    hideSyncIndicator();
    console.warn('Load error:', e.message);
  }
}

  const search = await driveAPI('GET', '/files', null,
    `q=${encodeURIComponent(q)}&fields=files(id,name)&spaces=drive`);
  if (search.files && search.files.length > 0) {
    return search.files[0].id;
  }
  // Create folder
  const meta = { name, mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) meta.parents = [parentId];
  const created = await driveAPI('POST', '/files', meta);
  return created.id;
}

// Ensure root folder exists, cache ID
async function getRootFolderId() {
  if (window._rootFolderId) return window._rootFolderId;
  const id = await getOrCreateFolder(ROOT_FOLDER_NAME);
  window._rootFolderId = id;
  // Save to CONFIG sheet
  saveConfig('drive_root_folder_id', id);
  return id;
}

// Create process folder structure
async function criarPastaProcesso(processo) {
  try {
    showSyncIndicator('Criando pasta no Drive...');
    const rootId = await getRootFolderId();
    // Folder name: FS260096 — Cliente
    const clienteShort = (processo.cliente||'').split(' ').slice(0,3).join(' ');
    const folderName = `${processo.id}${clienteShort ? ' — ' + clienteShort : ''}`;
    const folderId = await getOrCreateFolder(folderName, rootId);
    const folderUrl = `https://drive.google.com/drive/folders/${folderId}`;

    // Save folder ID and URL to processo
    const p = S.processos.find(x => x.id === processo.id);
    if (p) {
      if (!p.docs) p.docs = {};
      p.docs._folderId = folderId;
      p.docs._folderUrl = folderUrl;
    }

    hideSyncIndicator();
    scheduleAutoSave();
    return { folderId, folderUrl };
  } catch(e) {
    hideSyncIndicator();
    console.warn('Erro ao criar pasta:', e.message);
    showToast('⚠️ Não foi possível criar pasta no Drive');
    return null;
  }
}

// Save config value to CONFIG sheet
async function saveConfig(key, value) {
  try {
    const token = await getAccessToken();
    // Append to CONFIG sheet
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/CONFIG!A:B:append?valueInputOption=RAW`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[key, value]] })
    });
  } catch(e) {}
}

// Open process Drive folder
async function abrirPastaProcesso(p) {
  // If we have folder URL, open it
  if (p.docs && p.docs._folderUrl) {
    window.open(sanitizeUrl(p.docs._folderUrl), '_blank', 'noopener,noreferrer');
    return;
  }
  // If we have folderId, construct URL
  if (p.docs && p.docs._folderId) {
    const url = 'https://drive.google.com/drive/folders/' + p.docs._folderId;
    if (!p.docs._folderUrl) { p.docs._folderUrl = url; scheduleAutoSave(); }
    window.open(sanitizeUrl(url), '_blank', 'noopener,noreferrer');
    return;
  }
  // Try to create/find folder then open
  showToast('📂 Criando pasta no Drive...');
  try {
    const result = await criarPastaProcesso(p);
    if (result && result.folderUrl) {
      window.open(sanitizeUrl(result.folderUrl), '_blank', 'noopener,noreferrer');
      scheduleAutoSave();
      render();
    } else {
      // Fallback: open Drive root folder search
      window.open('https://drive.google.com/drive/search?q=' + encodeURIComponent(p.id), '_blank', 'noopener,noreferrer');
    }
  } catch(e) {
    // Fallback: open Drive search for this process
    window.open('https://drive.google.com/drive/search?q=' + encodeURIComponent(p.id), '_blank', 'noopener,noreferrer');
  }
}

// DRIVE FILE UPLOAD
// ═══════════════════════════════════════════════════════════

// Upload file to Drive folder and return file URL
async function uploadFileToDrive(file, processId) {
  try {
    showSyncIndicator('Fazendo upload: ' + file.name + '...');
    const token = await getAccessToken();

    // Get or create process folder first
    let folderId = null;
    const p = S.processos.find(x => x.id === processId);
    if (p && p.docs && p.docs._folderId) {
      folderId = p.docs._folderId;
    } else if (p) {
      const result = await criarPastaProcesso(p);
      if (result) folderId = result.folderId;
    }

    // Upload file metadata + content
    const metadata = {
      name: file.name,
      parents: folderId ? [folderId] : []
    };

    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    form.append('file', file);

    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
      {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: form
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Upload failed');
    }

    const fileData = await res.json();
    
    // Make file accessible (anyone with link can view)
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}/permissions`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });

    hideSyncIndicator();
    return { id: fileData.id, name: fileData.name, url: fileData.webViewLink };

  } catch(e) {
    hideSyncIndicator();
    showToast('⚠️ Erro no upload: ' + e.message);
    return null;
  }
}

// Open upload modal for a document type
function abrirUploadDoc(processId, docKey, docLabel) {
  const existing = document.getElementById('upload-modal');
  if (existing) existing.remove();

  const p = S.processos.find(x => x.id === processId);
  const currentUrl = p?.docs?.[docKey] || '';

  const modal = document.createElement('div');
  modal.id = 'upload-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width:480px;width:95%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="modal-title" style="margin-bottom:0">📎 ${escHtml(docLabel)}</div>
        <button class="btn btn-secondary btn-xs" onclick="document.getElementById('upload-modal').remove()">✕</button>
      </div>

      <div style="border:2px dashed var(--border2);border-radius:10px;padding:24px;text-align:center;margin-bottom:16px;cursor:pointer"
        onclick="document.getElementById('file-input-upload').click()"
        ondragover="event.preventDefault();this.style.borderColor='var(--accent2)'"
        ondragleave="this.style.borderColor='var(--border2)'"
        ondrop="event.preventDefault();handleDropUpload(event,'${escHtml(processId)}','${escHtml(docKey)}','${escHtml(docLabel)}')">
        <div style="font-size:36px;margin-bottom:8px">📂</div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">Clique ou arraste o arquivo aqui</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">PDF, Word, Excel, imagens — qualquer formato</div>
        <input type="file" id="file-input-upload" style="display:none"
          onchange="processUploadFile(this.files[0],'${escHtml(processId)}','${escHtml(docKey)}','${escHtml(docLabel)}')"/>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:10px;color:var(--muted);letter-spacing:1px">OU COLE O LINK</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <div class="ig">
        <label class="lbl">Link do Google Drive</label>
        <input type="url" id="doc-link-input" value="${escHtml(currentUrl)}"
          placeholder="https://drive.google.com/file/d/..."/>
      </div>

      ${currentUrl ? `<div style="margin-top:8px">
        <a href="${sanitizeUrl(currentUrl)}" target="_blank" rel="noopener noreferrer"
          style="color:var(--accent2);font-size:12px">↗ Ver arquivo atual</a>
      </div>` : ''}

      <div id="upload-progress" style="display:none;margin:12px 0;padding:10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--muted)">
        ⏳ Fazendo upload...
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" onclick="document.getElementById('upload-modal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarLinkDoc('${escHtml(processId)}','${escHtml(docKey)}')">💾 Salvar Link</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
}

async function processUploadFile(file, processId, docKey, docLabel) {
  if (!file) return;
  const prog = document.getElementById('upload-progress');
  if (prog) { prog.style.display = 'block'; prog.textContent = '⏳ Fazendo upload de ' + file.name + '...'; }

  const result = await uploadFileToDrive(file, processId);
  if (result) {
    // Save URL to processo docs
    const p = S.processos.find(x => x.id === processId);
    if (p) {
      if (!p.docs) p.docs = {};
      p.docs[docKey] = result.url;
    }
    scheduleAutoSave();

    if (prog) { prog.style.display = 'block'; prog.innerHTML = '✅ Upload concluído! <a href="' + sanitizeUrl(result.url) + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent2)">Ver arquivo ↗</a>'; }

    // Update link input
    const linkInput = document.getElementById('doc-link-input');
    if (linkInput) linkInput.value = result.url;

    showToast('✅ ' + file.name + ' enviado para o Drive!');
    setTimeout(() => { document.getElementById('upload-modal')?.remove(); render(); }, 1500);
  }
}

function handleDropUpload(event, processId, docKey, docLabel) {
  const file = event.dataTransfer.files[0];
  if (file) processUploadFile(file, processId, docKey, docLabel);
}

function salvarLinkDoc(processId, docKey) {
  const link = sanitizeUrl(document.getElementById('doc-link-input')?.value?.trim() || '');
  if (!link) { showToast('⚠️ Cole um link válido'); return; }
  const p = S.processos.find(x => x.id === processId);
  if (p) {
    if (!p.docs) p.docs = {};
    p.docs[docKey] = link;
    scheduleAutoSave();
    render();
  }
  document.getElementById('upload-modal')?.remove();
  showToast('✅ Documento salvo!');
}
