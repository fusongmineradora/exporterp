<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Exportação · Fu Song</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<style>
/* ── DARK THEME (default) ── */
:root {
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2d4a;
  --border:#1e2d45;--border2:#2a3f5f;
  --accent:#38BDF8;--accent2:#0EA5E9;--accent3:#7DD3FC;
  --green:#22C55E;--yellow:#F59E0B;--red:#EF4444;--purple:#818CF8;--orange:#FB923C;
  --text:#E2E8F0;--muted:#3D5470;--muted2:#64748B;--muted3:#94A3B8;
  --card-shadow:0 4px 24px rgba(0,0,0,0.5);
}
/* ── LIGHT THEME ── */
html.light {
  --bg:#F1F5F9;--bg2:#FFFFFF;--bg3:#F8FAFC;--bg4:#EFF6FF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --accent:#0284C7;--accent2:#0369A1;--accent3:#0EA5E9;
  --green:#15803D;--yellow:#B45309;--red:#DC2626;--purple:#4F46E5;--orange:#C2410C;
  --text:#0F172A;--muted:#94A3B8;--muted2:#475569;--muted3:#1E3A5F;
  --card-shadow:0 2px 16px rgba(0,0,0,0.06);
}
/* ── THEME TRANSITION ── */
*{transition:background-color 0.25s,border-color 0.25s,color 0.15s;}
input,select,button{transition:background-color 0.25s,border-color 0.25s,color 0.15s,box-shadow 0.15s;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;min-height:100vh;overflow-x:hidden;transition:background 0.25s,color 0.15s;}

/* ── SIDEBAR ── */
#sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);padding:24px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,0.15);}
.logo-area-mini{display:none;} /* só aparece no mobile (definido na media query) */
.logo{margin-bottom:32px;padding:0 6px;}
.logo-mark{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:var(--accent);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.logo-mark span{background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
html.light .logo-mark span{background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
html.light .btn-primary{color:#fff;}
html.light input,html.light select,html.light textarea{background:#f8fbff;color:var(--text);border-color:var(--border2);}
html.light .kpi{background:var(--bg2);}
html.light #theme-toggle{box-shadow:0 2px 12px rgba(0,0,0,0.1);}
html.light,html.light body{background:#F1F5F9 !important;color:#0F172A;}
html.light #main{background:#F1F5F9;}
html.light #sidebar{background:#ffffff;border-right-color:#c8d8e8;}
html.light .card{background:var(--bg2);border-color:var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.07);}
html.light .proc-row{background:var(--bg2);border-color:var(--border);}
html.light .proc-row:hover{background:var(--bg3);}
html.light .nav-btn:hover{background:var(--bg3);}
html.light .nav-btn.active{background:linear-gradient(90deg,var(--bg3),var(--bg4));}
html.light .tabs{background:var(--bg3);}
html.light .tab.active{background:var(--bg2);}
html.light .tab{color:var(--muted2);}
html.light .total-box{background:var(--bg3);}
html.light .lucro-box{background:var(--bg3);}
html.light .doc-chip{background:var(--bg3);border-color:var(--border2);}
html.light .cf-step{background:var(--bg3);border-color:var(--border);}
html.light .report-card{background:var(--bg2);border-color:var(--border);}
html.light .report-card:hover{background:var(--bg3);}
html.light .track-row:hover{background:var(--bg3);}
html.light #dash-fab{box-shadow:0 4px 16px rgba(0,95,163,0.3);}
html.light .modal{background:var(--bg2);border-color:var(--border2);}
html.light ::-webkit-scrollbar-track{background:var(--bg3);}
html.light ::-webkit-scrollbar-thumb{background:var(--border2);}
.logo-sub{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;padding-left:28px;}
.nav-section{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:0 8px;margin:16px 0 6px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:var(--muted2);font-size:12.5px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;margin-bottom:2px;transition:all 0.15s;font-weight:500;position:relative;}
.nav-btn:hover{background:var(--bg3);color:var(--text);}
.nav-btn.active{background:var(--bg3);color:var(--accent2);font-weight:600;border-left:3px solid var(--accent2);padding-left:9px;}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:14px 8px 0;border-top:1px solid var(--border);}
.sf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sf-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
.sf-val{color:var(--accent);font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;}

/* ── MAIN ── */
#main{flex:1;padding:28px 24px;overflow-y:auto;max-width:100%;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:14px;box-shadow:var(--card-shadow);transition:border-color 0.15s;}
.card-click{cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.card-click:hover{border-color:var(--accent2);transform:translateY(-1px);}
.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title-left{display:flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--text);}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}

/* ── FIELDS ── */
.field{margin-bottom:10px;}
.field-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.field-val{color:var(--text);font-size:13px;line-height:1.4;}
.field-val.mono{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11.5px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.badge-emb{background:#0088ff22;color:#00d4ff;border:1px solid #0088ff44;}
.badge-porto{background:#ffb80022;color:#ffb800;border:1px solid #ffb80044;}
.badge-arm{background:#b388ff22;color:#b388ff;border:1px solid #b388ff44;}
.badge-transit{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.badge-col{background:#3d608022;color:#6a90b0;border:1px solid #3d608044;}
.badge-cancelado{background:#ef444422;color:#ef4444;border:1px solid #ef444444;text-decoration:line-through;text-decoration-color:#ef4444aa;}
.badge-tipo{background:var(--bg3);color:var(--muted3);border:1px solid var(--border2);font-size:9px;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12.5px;font-family:'Inter',sans-serif;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent2);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,0.3);}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);color:var(--muted3);border:1px solid var(--border2);}
.btn-secondary:hover{color:var(--text);border-color:var(--muted);}
.btn-success{background:#00e5a018;color:var(--green);border:1px solid #00e5a033;}
.btn-success:hover{background:var(--green);color:#07101f;}
.btn-danger{background:#ff456018;color:var(--red);border:1px solid #ff456033;}
.btn-sm{padding:5px 12px;font-size:11.5px;}
.btn-xs{padding:3px 9px;font-size:11px;}

/* ── INPUTS ── */
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px #0088ff15;}
label.lbl{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
.ig{margin-bottom:12px;}
select option{background:var(--bg2);}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.kpi:hover{border-color:var(--accent2);transform:translateY(-2px);}
.kpi-label{color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.kpi-sub{color:var(--muted);font-size:10px;margin-top:5px;display:flex;justify-content:space-between;align-items:center;}

/* ── PROCESS ROW ── */
.proc-row{padding:14px 18px;border-radius:11px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:var(--bg2);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.proc-row:hover{border-color:var(--accent2);background:var(--bg3);transform:translateX(2px);}
.proc-id{font-family:'Outfit',sans-serif;font-weight:700;color:var(--accent);font-size:14px;margin-bottom:3px;}

/* ── COST ROWS ── */
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.cost-row:last-child{border-bottom:none;}
.c-label{color:var(--muted2);}
.c-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);}
.total-box{display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:8px;margin-top:10px;}

/* ── TRACK ROW ── */
.track-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 12px;border-bottom:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background 0.15s;gap:12px;}
.track-row:last-child{border-bottom:none;}
.track-row:hover{background:var(--bg3);}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;align-items:flex-start;padding:6px 0;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.tl-dot-done{background:var(--green);}
.tl-dot-active{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.tl-dot-pending{background:var(--border2);}
.tl-line{width:2px;background:var(--border);margin-left:4px;height:16px;}

/* ── DOC CHIPS ── */
.doc-grid{display:flex;flex-wrap:wrap;gap:8px;}
.doc-chip{padding:7px 13px;background:var(--bg);border:1px dashed var(--border2);border-radius:8px;color:var(--muted);font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.doc-chip:hover{border-color:var(--accent2);color:var(--accent);}
.doc-chip.has-doc{border-color:var(--green);border-style:solid;color:var(--green);background:rgba(34,197,94,0.06);}

/* Card compacto de lançamento */
.lanc-card{transition:transform 0.12s, box-shadow 0.12s;}
.lanc-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
@media (max-width:520px){
  .lanc-card .doc-chip{padding:2px 5px;font-size:9px;}
}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--text);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:10px;width:fit-content;margin-bottom:16px;}
.tab{padding:7px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;transition:all 0.15s;}
.tab.active{background:var(--bg2);color:var(--accent);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.3);}

/* ── SECTION DIVIDER ── */
.sec-divider{display:flex;align-items:center;gap:10px;margin:18px 0 12px;}
.sec-divider-line{flex:1;height:1px;background:var(--border);}
.sec-divider-label{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;}

/* ── TRACKING CARD ── */
.track-status-bar{display:flex;align-items:center;gap:0;margin:12px 0;}
.tsb-step{flex:1;text-align:center;position:relative;}
.tsb-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 4px;position:relative;z-index:1;}
.tsb-line{position:absolute;top:6px;left:50%;right:-50%;height:2px;z-index:0;}
.tsb-label{font-size:9px;color:var(--muted);letter-spacing:0.5px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#07101f;padding:11px 20px;border-radius:9px;font-weight:700;font-size:13px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,229,160,0.3);}

/* ── LUCRO BOX ── */
.lucro-box{padding:14px 16px;border-radius:10px;background:var(--bg);margin-top:12px;}

/* ── CAMBIO FLOW ── */
.cambio-flow{display:flex;gap:0;margin:12px 0;}
.cf-step{flex:1;padding:12px;background:var(--bg);border:1px solid var(--border);text-align:center;}
.cf-step:first-child{border-radius:9px 0 0 9px;}
.cf-step:last-child{border-radius:0 9px 9px 0;}
.cf-arrow{display:flex;align-items:center;color:var(--muted);font-size:18px;padding:0 4px;}

/* ── REPORT BTN ── */
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;}
.report-card:hover{border-color:var(--accent2);background:var(--bg3);}

/* ── THEME TOGGLE ── */
#theme-toggle{
  position:fixed;top:16px;right:20px;z-index:600;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:7px 14px;
  cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;
  font-weight:600;color:var(--muted3);
  display:flex;align-items:center;gap:7px;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
  transition:all 0.2s;
}
#theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
.toggle-track{
  width:34px;height:18px;background:var(--border2);
  border-radius:20px;position:relative;transition:background 0.2s;
}
.toggle-track.on{background:var(--accent2);}
.toggle-thumb{
  width:14px;height:14px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left 0.2s;
}
.toggle-track.on .toggle-thumb{left:18px;}

/* ── CONTAINER INPUT ── */
.container-input{font-family:'JetBrains Mono',monospace;font-size:12px;}

/* ── CARGO PROGRESS ── */
.cargo-route{display:flex;align-items:center;gap:6px;margin-top:8px;}
.cargo-route-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);flex-shrink:0;}
.cargo-route-line{flex:1;height:2px;background:var(--border2);border-radius:2px;position:relative;}
.cargo-route-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.cargo-route-label{font-size:10px;color:var(--muted2);}

/* ── TRACK ROW ENHANCED ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

@keyframes spin{to{transform:rotate(360deg)}}
/* ── LOGIN SCREEN ── */
#login-screen{
  position:fixed;inset:0;background:#07101f;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
}
.login-box{
  background:#111827;border:1px solid #1e2d45;border-radius:16px;
  padding:40px 36px;text-align:center;max-width:380px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.login-logo{font-size:40px;margin-bottom:16px;}
.login-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;
  color:#E2E8F0;margin-bottom:6px;letter-spacing:-0.5px;}
.login-sub{color:#64748B;font-size:13px;margin-bottom:28px;line-height:1.5;}
.login-divider{border:none;border-top:1px solid #1e2d45;margin:20px 0;}
.login-footer{color:#3D5470;font-size:11px;margin-top:20px;}
@media(max-width:480px){
  .login-box{padding:28px 20px;border-radius:12px;}
  .login-title{font-size:18px;}
  .login-sub{font-size:12px;}
}
#login-error{color:#EF4444;font-size:12px;margin-top:12px;display:none;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(3,1fr);}
  .g4,.g5{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:800px){
  #dash-fab{left:18px;}

  /* SIDEBAR — começa retraída (56px), só ícones + logo mini FS */
  #sidebar{
    width:56px;
    padding:14px 6px;
    position:fixed;
    transition:width 0.25s ease, transform 0.25s ease;
    z-index:200;
  }

  /* Esconde logo grande + texto labels quando retraída */
  #sidebar .logo-area-full{display:none;}
  #sidebar .logo-area-mini{
    display:flex;
    align-items:center;
    justify-content:center;
    width:42px;height:42px;
    background:#fff;
    border-radius:10px;
    margin:0 auto 14px;
    font-family:'Outfit',sans-serif;
    font-weight:800;
    font-size:14px;
    color:#1e293b;
    letter-spacing:-0.5px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    cursor:pointer;
  }
  #sidebar .logo-sub,
  #sidebar .nav-section,
  #sidebar .nav-btn span:not(.nav-icon),
  #sidebar .sidebar-footer .sf-label,
  #sidebar .sidebar-footer .sf-val,
  #sidebar .sb-action-text{display:none;}
  #sidebar .nav-btn{justify-content:center;padding:10px 0;}
  #sidebar .sb-action-btn{justify-content:center;padding:8px 0;}
  #sidebar .sidebar-footer{display:none;}

  /* SIDEBAR EXPANDIDA (toggled) — volta para 230px com texto */
  #sidebar.mobile-open{
    width:230px;
    padding:14px 12px;
    box-shadow:6px 0 28px rgba(0,0,0,0.25);
  }
  #sidebar.mobile-open .logo-area-mini{display:none;}
  #sidebar.mobile-open .logo-area-full{display:block;}
  #sidebar.mobile-open .logo-sub,
  #sidebar.mobile-open .nav-section,
  #sidebar.mobile-open .nav-btn span:not(.nav-icon),
  #sidebar.mobile-open .sidebar-footer .sf-label,
  #sidebar.mobile-open .sidebar-footer .sf-val,
  #sidebar.mobile-open .sb-action-text{display:inline;}
  #sidebar.mobile-open .nav-btn{justify-content:flex-start;padding:9px 12px;}
  #sidebar.mobile-open .sb-action-btn{justify-content:center;padding:7px 12px;}
  #sidebar.mobile-open .sidebar-footer{display:block;}

  /* HEADER MOBILE — barra superior fina com logo + tema */
  #mobile-header{
    display:flex !important;
    position:fixed;
    top:0;
    left:56px;
    right:0;
    height:52px;
    background:var(--bg2);
    border-bottom:1px solid var(--border);
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    z-index:90;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  html.light #mobile-header{background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);}

  /* BACKDROP escuro quando sidebar expandida */
  #sidebar-backdrop{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(15,23,42,0.55);
    backdrop-filter:blur(2px);
    z-index:150;
    cursor:pointer;
  }
  #sidebar.mobile-open ~ #sidebar-backdrop{display:block;}

  /* Conteúdo desloca pra direita 56px + cima 52px header */
  #main{padding:64px 10px 16px;margin-left:56px;}

  /* Esconde o theme-toggle flutuante no mobile (passa pro header) */
  #theme-toggle{display:none !important;}

  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .g3,.g4,.g5{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .modal{width:95%!important;max-width:95%!important;margin:10px;}
  .page-title{font-size:18px;}
  .card{padding:12px 10px;}
}
@media(max-width:480px){
  #sidebar{width:52px;padding:12px 4px;}
  #sidebar .logo-area-mini{width:38px;height:38px;font-size:12px;}
  #mobile-header{left:52px;height:50px;padding:0 12px;}
  #main{padding:60px 8px 12px;margin-left:52px;}
  .nav-btn{padding:10px 0;font-size:13px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .g2,.g3,.g4,.g5{grid-template-columns:1fr;}
  .kpi{padding:10px 8px;}
  .kpi-val{font-size:18px;}
  .card{padding:10px 8px;border-radius:10px;}
  .page-title{font-size:16px;}
  .btn{padding:8px 12px;font-size:12px;}
  .btn-primary{padding:9px 16px;}
  .modal{width:98%!important;max-width:98%!important;padding:16px!important;margin:4px;}
  .tabs{gap:2px;}
  .tab{padding:7px 10px;font-size:11px;}
  .cambio-flow{flex-direction:column;gap:8px;}
  .cf-arrow{transform:rotate(90deg);}
}
@media(min-width:1400px){
  #main{padding:28px 36px;}
  .kpi-grid{grid-template-columns:repeat(5,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

function _uiCloseModal(){const m=document.getElementById('ui-modal');if(m)m.remove();}
function uiAlert(msg, title='Aviso'){
  return new Promise(resolve => {
    _uiCloseModal();
    const modal=document.createElement('div');
    modal.id='ui-modal';
    modal.className='modal-overlay';
    modal.innerHTML=`<div class="modal" style="max-width:420px;width:92%">
      <div class="modal-title">${escHtml(title)}</div>

        <button class="btn btn-primary" id="ui-ok">OK</button>
      </div></div>`;
    document.body.appendChild(modal);
    const close=()=>{_uiCloseModal();resolve();};
    document.getElementById('ui-ok').onclick=close;
    modal.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='Enter')close();});
    setTimeout(()=>document.getElementById('ui-ok')?.focus(),50);
  });
}
function uiConfirm(msg, title='Confirmar', okLabel='Confirmar', cancelLabel='Cancelar'){
  return new Promise(resolve => {

        <button class="btn btn-primary" id="ui-ok">${escHtml(okLabel)}</button>
      </div></div>`;
    document.body.appendChild(modal);
    const done=v=>{_uiCloseModal();resolve(v);};
    document.getElementById('ui-ok').onclick=()=>done(true);
    document.getElementById('ui-cancel').onclick=()=>done(false);
    modal.addEventListener('keydown',e=>{if(e.key==='Escape')done(false);if(e.key==='Enter')done(true);});
    setTimeout(()=>document.getElementById('ui-ok')?.focus(),50);
  });
}

      <div style="color:var(--muted2);font-size:13px;line-height:1.5;margin-bottom:12px">${escHtml(msg)}</div>
      <div class="ig"><input type="text" id="ui-input" value="${escHtml(String(defaultValue||''))}" style="font-size:14px"/></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-secondary" id="ui-cancel">Cancelar</button>
        <button class="btn btn-primary" id="ui-ok">OK</button>
      </div></div>`;
    document.body.appendChild(modal);
    const inp=document.getElementById('ui-input');
    const done=v=>{_uiCloseModal();resolve(v);};
    document.getElementById('ui-ok').onclick=()=>done(inp.value);
    document.getElementById('ui-cancel').onclick=()=>done(null);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')done(inp.value);if(e.key==='Escape')done(null);});
    setTimeout(()=>{inp?.focus();inp?.select();},50);
  });
}
// Sanitize remove apenas caracteres perigosos de injeção HTML/JS.
// Apóstrofes e aspas são MANTIDAS porque escHtml() escapa na renderização.
// Preserva nomes legítimos como "L'Oréal", "O'Hara", endereços com aspas, etc.
const sanitize=s=>String(s||'').replace(/[<>`]/g,'').trim();
const sanitizeUrl=s=>{
  const u=String(s||'').trim();
  return (u.startsWith('http://') || u.startsWith('https://')) ? u : '';
};

// #G + #16 — IDs únicos. Usa crypto.randomUUID se disponível, fallback robusto.
const genId = () => {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
};

// GOOGLE LOGIN
// ═══════════════════════════════════════════════════════════
const ALLOWED_EMAILS = ['klismann.lai@gmail.com', 'lai@fusongmineradora.com'];

// Login attempt rate limiting
let _loginAttempts = 0;
let _loginBlockedUntil = 0;

function handleGoogleLogin(response) {
  // Rate limit: max 5 tentativas em 5 minutos (#3 corrigido: bloqueia ANTES de processar)
  if(Date.now() < _loginBlockedUntil) {
    document.getElementById('login-error').textContent = '⏳ Muitas tentativas. Aguarde alguns minutos.';
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  _loginAttempts++;
  if(_loginAttempts > 5) {
    _loginBlockedUntil = Date.now() + (5 * 60 * 1000);
    _loginAttempts = 0;
    document.getElementById('login-error').textContent = '⏳ Muitas tentativas. Aguarde alguns minutos.';
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  try {
    // Decode JWT token from Google
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = (payload.email||'').toLowerCase().trim();
    const name = sanitize(payload.name||'Usuário');
    const picture = (payload.picture||'').startsWith('https://') ? payload.picture : '';
    // Validate token issuer
    if(!payload.iss || !payload.iss.includes('accounts.google.com')){
      document.getElementById('login-error').style.display='block';
      return;
    }

    if (!ALLOWED_EMAILS.includes(email)) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }

    // #5 — Reset de estado quando há troca de usuário
    // Evita que dados do user anterior fiquem visíveis se loadFromSheets falhar
    const prevUser = sessionStorage.getItem('erp-user');
    if (prevUser) {
      try {
        const parsed = JSON.parse(prevUser);
        if (parsed.email && parsed.email !== email) {
          // Troca de conta — zera dados locais
          S.processos = [];
          S.clientes = [];
          S.fornecedores = [];
          S.lancamentos = [];
          S.custosMensais = [];
          S.sub = null;
        }
      } catch(e) {}
    }

    // Store session
    sessionStorage.setItem('erp-user', JSON.stringify({
      email, name, picture,
      expires: Date.now() + (8 * 60 * 60 * 1000) // 8 hours
    }));

    // Hide login, show ERP
    const ls = document.getElementById('login-screen');
    const mn = document.getElementById('main');
    if(ls) ls.style.display = 'none';
    if(mn) { mn.style.display = 'block'; mn.style.background = isLight ? '#F1F5F9' : '#0a0f1e'; }

    // Update sidebar with user info
    updateUserInfo(name, email, picture);

    // Init ERP
    applyTheme();
    nav('dashboard');

    // Tenta restaurar token salvo da sessão anterior (se ainda válido)
    // Se houver, carrega dados silenciosamente.
    // Se NÃO houver, mostra banner amigável "Conectar ao Drive" — usuário clica quando quiser
    // (não chamamos getAccessToken automaticamente para evitar bloqueio de pop-up do navegador)
    setTimeout(async () => {
      try {
        if (restoreTokenFromStorage()) {
          scheduleTokenRenewal();
          await setupSheets();
          await loadFromSheets();
          await checkLocalBackup();  // #A
        } else {
          // Mostra banner pedindo conexão (sem disparar pop-up automaticamente)
          mostrarBannerConexaoDrive();
        }
      } catch(e) {
        console.warn('Sheets init:', e);
      }
    }, 400);

  } catch(e) {
    // Login error handled silently
    document.getElementById('login-error').style.display = 'block';
  }
}

  banner.innerHTML = `

function checkSession() {
  const user = sessionStorage.getItem('erp-user');
  if (user) {
    try {
      const parsed = JSON.parse(user);
      if(parsed.expires && Date.now() > parsed.expires){
        sessionStorage.removeItem('erp-user');
        sessionStorage.removeItem('erp-gtoken');
        sessionStorage.removeItem('drive-consented');  // #6
        return false;
      }
      const {name, email, picture} = parsed;
      const lsc = document.getElementById('login-screen');
      const mnc = document.getElementById('main');
      if(lsc) lsc.style.display = 'none';
      if(mnc) { mnc.style.display = 'block'; mnc.style.background = isLight ? '#F1F5F9' : '#0a0f1e'; }
      updateUserInfo(name, email, picture);
      applyTheme();
      nav('dashboard');
      // Restaura token do storage, ou pede silenciosamente se já consentiu
      setTimeout(async () => {
        if (restoreTokenFromStorage()) {
          // Token ainda válido — agenda renovação automática
          scheduleTokenRenewal();
          try {
            await loadFromSheets();
            await checkLocalBackup();  // #A — confere se há backup local mais novo
          } catch(e) {}
          return;
        }
        // Sem token salvo → mostra banner pra usuário clicar (sem auto-popup)
        mostrarBannerConexaoDrive();
      }, 500);
      return true;
    } catch(e) {}
  }
  return false;
}

  if(isLight){
    html.classList.add('light');

// Máscara de input de data: digita só números, formata automaticamente para dd/mm/aaaa
// #27 — limita dia 1-31 e mês 1-12 enquanto digita (não impede ano inválido — flexível para anos antigos)
function _maskDateInput(input){
  if (!input) return;
  let v = String(input.value || '').replace(/\D/g, '');  // só dígitos
  if (v.length > 8) v = v.slice(0, 8);
  // Limita dia (primeiros 2 dígitos) a 01-31
  if (v.length >= 2) {
    const dd = parseInt(v.slice(0,2), 10);
    if (dd > 31) v = '31' + v.slice(2);
    else if (dd === 0 && v.length === 2) v = '01';
  }
  // Limita mês (dígitos 3-4) a 01-12
  if (v.length >= 4) {
    const mm = parseInt(v.slice(2,4), 10);
    if (mm > 12) v = v.slice(0,2) + '12' + v.slice(4);
    else if (mm === 0) v = v.slice(0,2) + '01' + v.slice(4);
  }
  let out = '';
  if (v.length >= 1) out = v.slice(0, 2);
  if (v.length >= 3) out += '/' + v.slice(2, 4);
  if (v.length >= 5) out += '/' + v.slice(4, 8);
  input.value = out;
}

function renderProcessos(){
  if(S.createMode) return renderProcessoForm(null);
  if(S.editMode && S.sub) return renderProcessoForm(S.sub);
  if(S.sub) return renderProcessoDetalhe(S.sub);

  const lista=S.filter?S.processos.filter(p=>p.status===S.filter):S.processos;
  return `
  ${backBtn()}
  <div class="page-header">
    <div class="page-title">Processos ${S.filter?`<span style="font-size:14px;color:var(--muted2)">· ${S.filter}</span>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      ${S.filter?`<button class="btn btn-secondary btn-sm" onclick="S.filter=null;render()">✕ Limpar filtro</button>`:''}
      <button class="btn btn-primary" onclick="S.createMode=true;S.sub=null;render()">+ Novo Processo</button>
    </div>
  </div>
  ${lista.length===0?`<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px">Nenhum processo encontrado.</div>`:''}
  ${lista.map(p=>`
    <div class="proc-row" onclick="S.sub=S.processos.find(x=>x.id==='${p.id}');S.editMode=false;render()">
      <div style="flex:1">
        <div class="proc-id">${p.id} <span style="color:var(--muted);font-weight:400;font-size:11px">· ${p.produto} · Embarque ${p.embarque}</span></div>
        <div style="color:var(--muted2);font-size:11.5px;margin:3px 0">${p.pol} → ${p.pod} · ${p.companhia} · Saída: ${p.saida}</div>
        <div style="color:var(--muted);font-size:10.5px">Container: ${p.container} · Booking: ${p.booking}</div>

        ${badge(p.status)}
        <span style="font-family:'JetBrains Mono',monospace;color:var(--yellow);font-size:11.5px">R$ ${fmt(tc(p))}</span>
        <span style="color:var(--muted);font-size:9px">VER DETALHE →</span>
      </div>
    </div>`).join('')}`;
}

function renderProcessoForm(p){
  const isEdit=!!p;

  // Auto-generate next process number — usa MÁXIMO existente (não o último, que pode estar fora de ordem após carregar do Sheets)
  const allNums = S.processos
    .map(x => parseInt(String(x.id||'').replace(/^FS/i,''), 10))
    .filter(n => !isNaN(n) && n > 0);
  const lastNum = allNums.length > 0 ? Math.max(...allNums) : 260095;
  const nextNum = isEdit ? parseInt(String(p.id||'').replace(/^FS/i,''),10) : lastNum + 1;
  const nextId = isEdit ? p.id : 'FS' + nextNum;
  const baseEmb = 9; const baseProc = 260096;
  const nextEmb = isEdit ? (p.embarque||'') : (String(baseEmb + (nextNum-baseProc)).padStart(2,'0'));
  const nextInv = isEdit ? p.invoiceNum : 'Invoice - ' + nextId;
  const nextCont = isEdit ? p.contratoNum : 'Contrato - ' + nextId;

  // Defaults for new vs edit — usa o processo de MAIOR id (último cronologicamente) para herdar dados
  const d = (k,def) => isEdit ? (p?.[k]||'') : def;
  const lastP = allNums.length > 0
    ? S.processos.find(x => parseInt(String(x.id||'').replace(/^FS/i,''),10) === lastNum) || {}
    : {};
  const dc = (k) => isEdit ? (p?.[k]||0) : (lastP[k]||0);

  const statuses=['Embarcado','No Porto','No Armazém','A Coletar'];
  const incoterms=['CFR','FOB','CIF','EXW','DAP','DDP'];

  const custoStatus=STATUS_OPTIONS;

  return `

      </div>
      <div class="ig"><label class="lbl">Invoice <span style="font-size:9px;color:var(--muted)">(editável)</span></label>
        <input type="text" id="f_invoiceNum" value="${nextInv}" style="font-family:'JetBrains Mono',monospace"/>

      <div class="ig"><label class="lbl">Contrato <span style="font-size:9px;color:var(--muted)">(editável)</span></label>

function renderRastreamento(){
  // ── URLS DE TRACKING POR COMPANHIA ──
  // Cada companhia tem URL pública gratuita que aceita o container direto na query
  const trackUrl = (companhia, container) => {
    const c = (container||'').trim().toUpperCase().replace(/\s/g,'');
    if(!c) return null;
    const comp = (companhia||'').toUpperCase();
    if(comp.includes('MAERSK'))                    return `https://www.maersk.com/tracking/${encodeURIComponent(c)}`;
    if(comp.includes('COSCO'))                     return `https://elines.coscoshipping.com/ebusiness/cargoTracking?trackingType=CONTAINER&number=${encodeURIComponent(c)}`;
    if(comp.includes('MSC') || comp.includes('MEDITERRANEAN')) return `https://www.msc.com/track-a-shipment?agencyPath=msc&searchNumber=${encodeURIComponent(c)}`;
    if(comp.includes('CMA') || comp.includes('CGM'))           return `https://www.cma-cgm.com/ebusiness/tracking/search?number=${encodeURIComponent(c)}`;
    if(comp.includes('HAPAG'))                     return `https://www.hapag-lloyd.com/en/online-business/track/track-by-container-solution.html?container=${encodeURIComponent(c)}`;
    if(comp.includes('YANG') || comp.includes('YML')) return `https://e-solution.yangming.com/e-service/Track_trace/track_trace_cargo_tracking.aspx?rdolType=BL&q=${encodeURIComponent(c)}`;
    return null;
  };

  // Cross-carrier (caso a companhia não esteja na lista, ou pra comparação)
  const trackTraceUrl = c => `https://www.track-trace.com/container/${encodeURIComponent((c||'').toUpperCase())}`;
  const shipsGoUrl    = c => `https://shipsgo.com/iframe-tracking?type=container&containerNumber=${encodeURIComponent((c||'').toUpperCase())}`;

  const compIcon = (companhia) => {
    const comp = (companhia||'').toUpperCase();
    if(comp.includes('MAERSK')) return '🔵';
    if(comp.includes('COSCO'))  return '🔴';
    if(comp.includes('MSC') || comp.includes('MEDITERRANEAN')) return '🟡';
    if(comp.includes('CMA') || comp.includes('CGM'))  return '🟢';
    if(comp.includes('HAPAG'))  return '🟠';
    if(comp.includes('YANG'))   return '🟣';
    return '🚢';
  };
  const compNome = (companhia) => {
    const comp = (companhia||'').toUpperCase();
    if(comp.includes('MAERSK'))  return 'Maersk';
    if(comp.includes('COSCO'))   return 'COSCO';
    if(comp.includes('MSC'))     return 'MSC';
    if(comp.includes('CMA'))     return 'CMA CGM';
    if(comp.includes('HAPAG'))   return 'Hapag-Lloyd';
    if(comp.includes('YANG'))    return 'Yang Ming';
    return companhia || 'Companhia';
  };

  // Filtra processos em trânsito (qualquer status que indique carga em movimento)
  const emTransito = S.processos.filter(p => {
    const s = p.status||'';
    return ['Embarcado','No Porto','No Armazém','Indo para Armazém'].includes(s);
  });

  // Função copy-to-clipboard
  // Os <a href> abrem o site por conta própria; aqui só copiamos o número
  if (!window._erpCopyAndOpen) {
    window._erpCopyAndOpen = function(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(()=>{});
        }
      } catch(e) {}
      showToast('📋 ' + text + ' copiado');
    };
  }

  return `
  ${backBtn()}
  <div class="page-header">
    <div>
      <div class="page-title">Rastreamento de Containers</div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px">${emTransito.length} ${emTransito.length===1?'carga em trânsito':'cargas em trânsito'} · Tracking oficial gratuito</div>
    </div>
  </div>

  ${emTransito.length === 0 ? `
    <div class="card" style="text-align:center;padding:50px 20px">
      <div style="font-size:48px;margin-bottom:14px">📡</div>
      <div style="color:var(--text);font-size:15px;font-weight:600;margin-bottom:6px">Nenhuma carga em trânsito</div>
      <div style="color:var(--muted2);font-size:12px">Quando um processo estiver com status "Indo para Armazém", "No Armazém", "No Porto" ou "Embarcado", ele aparecerá aqui automaticamente.</div>
    </div>
  ` : emTransito.map(p => {
    const trackingOk = trackUrl(p.companhia, p.container);
    const containerLimpo = (p.container||'').trim().toUpperCase();
    const hasContainer = containerLimpo.length > 0;
    const compLabel = compNome(p.companhia);

    return `
    <div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
      <!-- HEADER do card -->
      <div style="padding:14px 18px;background:linear-gradient(135deg,rgba(14,165,233,0.08),rgba(34,225,192,0.06));border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
              <span style="font-size:22px">${compIcon(p.companhia)}</span>
              <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:var(--text)">${escHtml(p.id)}</span>
              <span style="color:var(--muted2);font-size:13px">— ${escHtml(p.produto||'')}</span>
              ${badge(p.status)}
            </div>
            <div style="font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap">
              <span>🛳️ ${escHtml(compLabel)}</span>
              ${p.pol||p.origem ? `<span>🛫 ${escHtml(p.pol||p.origem)}</span>` : ''}
              ${p.pod||p.destino ? `<span>🛬 ${escHtml(p.pod||p.destino)}</span>` : ''}
              ${p.saida ? `<span>📅 Saída ${escHtml(p.saida)}</span>` : ''}
            </div>
          </div>
        </div>
      </div>

      <!-- CONTAINER NUMBER em destaque -->
      <div style="padding:16px 18px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:4px">📦 Número do Container</div>
          ${hasContainer ?
            `<div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--accent);letter-spacing:1px">${escHtml(containerLimpo)}</div>` :
            `<div style="font-size:13px;color:var(--yellow)">⚠️ Container não informado — preencha no processo</div>`
          }
        </div>
        ${hasContainer ? `
          <button class="btn btn-secondary btn-sm" onclick="_erpCopyAndOpen('${escHtml(containerLimpo)}')" title="Copiar para área de transferência" style="white-space:nowrap">
            📋 Copiar
          </button>
        ` : ''}
      </div>

      <!-- BOTÕES DE TRACKING -->
      ${hasContainer ? `
      <div style="padding:14px 18px">
        <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:10px">🔗 Rastrear este container</div>

        ${trackingOk ? `
          <!-- Botão principal: companhia oficial -->
          <a href="${trackingOk}" target="_blank" rel="noopener noreferrer"
             onclick="_erpCopyAndOpen('${escHtml(containerLimpo)}')"
             style="display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#0EA5E9,#22e1c0);color:#fff;padding:14px 16px;border-radius:10px;text-decoration:none;font-weight:700;margin-bottom:10px;box-shadow:0 4px 12px rgba(14,165,233,0.25)">
            <span style="display:flex;align-items:center;gap:10px">
              <span style="font-size:20px">${compIcon(p.companhia)}</span>
              <span>
                <div style="font-size:14px">Rastrear no ${escHtml(compLabel)}</div>
                <div style="font-size:10.5px;opacity:0.85;font-weight:400">Site oficial · Dados em tempo real</div>
              </span>
            </span>
            <span style="font-size:18px">↗</span>
          </a>
        ` : `
          <div style="background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);padding:12px 14px;border-radius:10px;margin-bottom:10px;font-size:12px;color:var(--yellow)">
            ⚠️ Companhia "${escHtml(p.companhia||'(não informada)')}" não tem URL pré-configurada. Use os trackers genéricos abaixo.
          </div>
        `}

        <!-- Fallbacks cross-carrier -->
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a href="${trackTraceUrl(containerLimpo)}" target="_blank" rel="noopener noreferrer"
             onclick="_erpCopyAndOpen('${escHtml(containerLimpo)}')"
             class="btn btn-secondary btn-sm" style="flex:1;min-width:140px;text-align:center;text-decoration:none">
            🌐 Track-Trace (multi-carrier)
          </a>
          <a href="${shipsGoUrl(containerLimpo)}" target="_blank" rel="noopener noreferrer"
             onclick="_erpCopyAndOpen('${escHtml(containerLimpo)}')"
             class="btn btn-secondary btn-sm" style="flex:1;min-width:140px;text-align:center;text-decoration:none">
            🚢 ShipsGo (multi-carrier)
          </a>
        </div>

        <div style="margin-top:10px;font-size:10.5px;color:var(--muted);line-height:1.5">
          💡 O número do container é copiado automaticamente ao clicar. Cole se o site não preencher sozinho.
        </div>
      </div>
      ` : `
      <div style="padding:14px 18px;font-size:12px;color:var(--muted)">
        <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);padding:10px 14px;border-radius:8px;color:var(--red)">
          Para rastrear, preencha o número do container no detalhe do processo.
        </div>
      </div>
      `}

      <!-- LINHA DO TEMPO (resumo do progresso) -->
      <div style="padding:14px 18px;background:var(--bg);border-top:1px solid var(--border)">
        <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:10px">📍 Progresso no ERP</div>
        ${(() => {
          const progPct = p.status==='Embarcado'?80:p.status==='No Porto'?60:p.status==='No Armazém'?40:p.status==='Indo para Armazém'?20:5;
          return `
          <div style="position:relative;margin-bottom:14px;height:22px">
            <div style="position:absolute;top:9px;left:0;right:0;height:4px;background:var(--border);border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${progPct}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.4s"></div>
            </div>
            <div style="position:absolute;top:-2px;left:${progPct}%;transform:translateX(-50%);font-size:18px;text-shadow:0 2px 4px rgba(0,0,0,0.18);transition:left 0.4s">${_statusIcon(p.status)}</div>
          </div>`;
        })()}
        <div style="display:flex;gap:0">
          ${[
            {label:'Coleta', date:p.logEmbarque, done:['Indo para Armazém','No Armazém','No Porto','Embarcado'].includes(p.status)},
            {label:'Trânsito', date:'', done:['Indo para Armazém','No Armazém','No Porto','Embarcado'].includes(p.status), active:p.status==='Indo para Armazém'},
            {label:'Armazém', date:p.logChegada, done:['No Armazém','No Porto','Embarcado'].includes(p.status), active:p.status==='No Armazém'},
            {label:'Porto', date:p.logPorto, done:['No Porto','Embarcado'].includes(p.status), active:p.status==='No Porto'},
            {label:'Mar', date:p.saida, done:p.status==='Embarcado', active:p.status==='Embarcado'},
          ].map(s=>`
            <div style="flex:1;text-align:center">
              <div style="width:10px;height:10px;border-radius:50%;margin:0 auto 4px;background:${s.done?'var(--accent2)':'var(--border2)'};${s.active?'box-shadow:0 0 0 3px rgba(14,165,233,0.25)':''}"></div>
              <div style="font-size:10px;color:${s.active?'var(--accent)':s.done?'var(--text)':'var(--muted)'};font-weight:${s.active?'600':'400'}">${s.label}</div>
              <div style="font-size:9px;color:var(--muted);margin-top:1px">${escHtml(s.date||'—')}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('')}

  ${emTransito.length > 0 ? `
  <div style="margin-top:18px;padding:14px;background:var(--bg);border:1px dashed var(--border2);border-radius:10px;font-size:11.5px;color:var(--muted);line-height:1.6">
    <strong style="color:var(--text)">ℹ️ Como funciona o rastreamento</strong><br>
    O sistema gera links diretos para o site oficial de cada companhia marítima, já com o número do container preenchido. O tracking é feito pela companhia (Maersk, COSCO, etc.) — não pelo ERP. Em casos de transbordo, o tracking oficial sabe disso e mostra a jornada completa.
  </div>
  ` : ''}`;
}

      <div class="sec-divider"><div class="sec-divider-line"></div><div class="sec-divider-label">Pré-Embarque</div><div class="sec-divider-line"></div></div>
      <div class="g3">

          <div style="display:flex;gap:8px;align-items:center">

          <div class="field"><div class="field-label">Lucro Operacional</div>

          <div class="field"><div class="field-label">Chave de Acesso</div><div class="field-val mono" style="font-size:10px;word-break:break-all">${escHtml(p.dueChave||'—')}</div></div>
        </div>

}

// Auto-fill cambio form from selected processo
function autoPreencherCambio(id){
  if(!id || id==='— Nenhum —') return;
  const p = S.processos.find(x=>x.id===id);
  if(!p) return;
  const setV = (eid,val)=>{ const el=document.getElementById(eid); if(el) el.value=val||''; };
  setV('nc_invoiceNum', p.invoiceNum);
  setV('nc_contratoNum', p.contratoNum);
  setV('nc_banco', p.cambioBanco||'Itaú');
  setV('nc_invoiceVal', p.cambioInvoice||'');
  setV('nc_taxa', p.cambioTaxa||'');
  setV('nc_fechamento', p.cambioFechamento||'');
  setV('nc_due', p.dueNumero||'');
  setV('nc_chave', p.dueChave||'');
  setV('nc_recebimento', p.cambioRecebimento||'');
  setV('nc_recebido', p.cambioRecebido||'');
  setV('nc_iof', p.cambioIOF||'');
  setV('nc_spread', p.cambioSpread||'');
  setV('nc_reais', p.cambioReais||'');
  setV('nc_status', normalizeStatus(p.cambioStatus||'Em Aberto'));
}

// CUSTOS
// ═══════════════════════════════════════════════════════════
function renderCustos(){
  const tab=S.custosTab||'processo';
  const ps=S.processos;
  const totalC=ps.reduce((a,p)=>a+tc(p),0);
  const totalR=ps.reduce((a,p)=>a+(p.cambioReais||0),0);

  const tabsHtml=`<div class="tabs">
    <button class="tab ${tab==='processo'?'active':''}" onclick="S.custosTab='processo';render()">💸 Por Processo</button>
    <button class="tab ${tab==='fixos'?'active':''}" onclick="S.custosTab='fixos';render()">🏢 Custos Fixos</button>
    <button class="tab ${tab==='consolidado'?'active':''}" onclick="S.custosTab='consolidado';render()">📊 Consolidado</button>
    <button class="tab ${tab==='lancamentos'?'active':''}" onclick="S.custosTab='lancamentos';render()">💳 Extrato de Caixa</button>
  </div>`;

  if(tab==='fixos'){
    // Garante pelo menos um mês ativo
    if (!S.custosMensais || S.custosMensais.length === 0) {
      const hoje = new Date();
      const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      S.custosMensais = [{
        id: genId(),
        mes: meses[hoje.getMonth()], ano: hoje.getFullYear(),
        contador:0, aluguel:0, software:0, internet:0, telefone:0, impostos:0, outros:0, docs:{}
      }];
    }
    if (!S.fixoMesAtivo) S.fixoMesAtivo = String(S.custosMensais[0].id || 0);
    if (!S.mesExpanded) S.mesExpanded = new Set();
    // Garante que o mês mais recente é expandido APENAS UMA VEZ (na primeira visita).
    // Sem essa flag, retrair o único mês existente faria size===0 e re-expandiria sozinho.
    if (!S._mesExpandedInit && S.custosMensais.length > 0) {
      S.mesExpanded.add(String(S.custosMensais[0].id));
      S._mesExpandedInit = true;
    }

    return `
    ${backBtn()}
    <div class="page-header">
      <div class="page-title">Custos Fixos</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="novoMesFixo()" title="Criar próximo mês baseado no atual">📅 Novo Mês</button>
        <button class="btn btn-secondary btn-sm" onclick="toggleAllMeses()" title="Expandir ou retrair todos os meses">📂 Expandir/Retrair tudo</button>
        <button class="btn btn-success btn-sm" onclick="gerarRelatorioMensal()">📑 PDF</button>
      </div>
    </div>
    ${tabsHtml}

    ${S.custosMensais.map(m => {
      const entries = buildAllEntries({ filtroMesFixoId: m.id });
      const totalCustos = entries.filter(e => e.tipo==='Despesa').reduce((a,e)=>a+(e.valor||0), 0);
      const totalPagos = entries.filter(e => e.tipo==='Despesa' && e.status==='Pago').length;
      const totalAberto = entries.filter(e => e.tipo==='Despesa' && e.status==='Em Aberto').reduce((a,e)=>a+(e.valor||0), 0);
      const totalPago = entries.filter(e => e.tipo==='Despesa' && e.status==='Pago').reduce((a,e)=>a+(e.valor||0), 0);
      const totalItens = entries.filter(e => e.tipo==='Despesa').length;
      const expanded = S.mesExpanded.has(String(m.id));

      return `
      <div class="proc-grouper" style="background:var(--bg2);border:1px solid var(--border2);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:var(--card-shadow)">

          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
                <span style="font-size:18px;color:var(--muted);transition:transform 0.2s;display:inline-block;transform:rotate(${expanded?'90':'0'}deg);user-select:none">▶</span>
                <span style="font-size:20px">📅</span>
                <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:var(--text)">${escHtml(mesNome)}</span>
                <span style="font-size:9px;color:var(--accent2);background:rgba(34,197,160,0.1);padding:2px 7px;border-radius:4px;font-weight:600">FIXO MENSAL</span>
              </div>
              <div style="font-size:11px;color:var(--muted);padding-left:38px">
                ${totalItens} ${totalItens===1?'item':'itens'} · ${totalPagos} pago${totalPagos===1?'':'s'}
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">
              <button class="btn btn-secondary btn-xs" onclick="editarMesFixo('${escHtml(String(m.id))}')" title="Renomear mês" style="padding:5px 10px">✏️</button>

            </div>
          </div>
        </div>

        <!-- KPI ROW (3 KPIs: Total | Em Aberto | Pago) -->

            <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:var(--red)">R$ ${fmt(totalCustos)}</div>
          </div>
          <div style="padding:12px 14px;border-right:1px solid var(--border)">

            <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:var(--yellow)">R$ ${fmt(totalAberto)}</div>
          </div>
          <div style="padding:12px 14px">
            <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.3px;text-transform:uppercase;font-weight:600;margin-bottom:4px">🟢 Pago</div>
            <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:var(--green)">R$ ${fmt(totalPago)}</div>

              ? `<div style="padding:18px;text-align:center;color:var(--muted);font-size:12px;background:var(--bg);border-radius:8px">Nenhum custo fixo neste mês. Use ✏️ em cada item para preencher os valores.</div>`

        ` : ''}
      </div>`;
    }).join('')}`;
  }

  if(tab==='consolidado'){
    const totalFixos=S.custosMensais.reduce((a,m)=>a+tcm(m),0);
    const totalGeral=totalC+totalFixos;

    return `

        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Custos Variáveis</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--yellow)">R$ ${fmt(totalC)}</div></div>
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Custos Fixos</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--orange)">R$ ${fmt(totalFixos)}</div></div>
        <div class="lucro-box"><div style="color:var(--muted);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px">Lucro Líquido</div><div style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:${lucroGeral>=0?'var(--green)':'var(--red)'}">R$ ${fmt(lucroGeral)}</div></div>
      </div>
    </div>
    ${ps.map(p=>{
      const c=tc(p); const l=(p.cambioReais||0)-c;
      return `<div class="card"><div class="card-title"><div class="card-title-left">${p.id} — ${p.produto}</div>${badge(p.status)}</div>

        <div class="total-box"><span style="color:var(--muted);font-size:11px">Custos</span><span style="color:var(--yellow);font-family:'Outfit',sans-serif;font-weight:700">R$ ${fmt(c)}</span></div>

        <div class="total-box"><span style="color:var(--muted);font-size:11px">Lucro</span><span style="color:${l>=0?'var(--green)':'var(--red)'};font-family:'Outfit',sans-serif;font-weight:700">R$ ${fmt(l)}</span></div>
      </div></div>`;}).join('')}`;

  ${tabsHtml}

// Expandir ou retrair todos os processos
function toggleAllProcs(){
  if (!S.procExpanded) S.procExpanded = new Set();
  const allIds = S.processos.map(p => p.id);
  const allExpanded = allIds.every(id => S.procExpanded.has(id));

// Expandir ou retrair todos os meses do extrato
function toggleAllExtratoMeses(){
  if (!S.extratoMesExpanded) S.extratoMesExpanded = new Set();
  // Reconstrói chaves de meses a partir das entries atuais
  const all = buildAllEntries();
  const chaves = new Set();
  all.forEach(l => {
    const d = l.data;
    if (!d) { chaves.add('sem-data'); return; }
    const m1 = String(d).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m1) { chaves.add(m1[3]+'-'+m1[2].padStart(2,'0')); return; }
    const m2 = String(d).match(/^(\w+)\/(\d{4})$/);
    if (m2) {
      const mn = {janeiro:'01',fevereiro:'02','março':'03',marco:'03',abril:'04',maio:'05',junho:'06',julho:'07',agosto:'08',setembro:'09',outubro:'10',novembro:'11',dezembro:'12'};
      const n = mn[m2[1].toLowerCase()];
      if (n) chaves.add(m2[2]+'-'+n);
    }
  });
  const arr = [...chaves];
  const allExpanded = arr.every(k => S.extratoMesExpanded.has(k));
  if (allExpanded) {
    S.extratoMesExpanded.clear();
  } else {
    arr.forEach(k => S.extratoMesExpanded.add(k));
  }
  render();
}

function atualizarValorFixo(mesId, field, valor){

  if (!m) return;
  m[field] = parseFloat(valor) || 0;

function novoMesFixo(){
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const hoje = new Date();
  // Buscar próximo mês a partir do mais recente
  const ult = S.custosMensais && S.custosMensais.length > 0 ? S.custosMensais[0] : null;
  let nextMesNome = meses[hoje.getMonth()];
  let nextAno = hoje.getFullYear();
  if (ult && ult.mes) {
    const idx = meses.indexOf(ult.mes);
    if (idx >= 0) {
      nextMesNome = meses[(idx + 1) % 12];
      nextAno = idx === 11 ? (parseInt(ult.ano||hoje.getFullYear(),10) + 1) : (ult.ano || hoje.getFullYear());
    }
  }
  // Copia valores do mês anterior (mas zera docs)
  const novo = {
    id: genId(),
    mes: nextMesNome, ano: nextAno,
    contador: (ult?.contador)||0, aluguel: (ult?.aluguel)||0,
    software: (ult?.software)||0, internet: (ult?.internet)||0,
    telefone: (ult?.telefone)||0, impostos: (ult?.impostos)||0,
    outros: (ult?.outros)||0,
    docs: {}
  };
  S.custosMensais.unshift(novo);
  S.fixoMesAtivo = String(novo.id);
  showToast('✅ ' + novo.mes + '/' + novo.ano + ' criado');
  scheduleAutoSave();
  render();
}

async function editarMesFixo(mesId){
  const m = (S.custosMensais||[]).find(x => String(x.id) === String(mesId));
  if (!m) return;
  const nome = await uiPrompt('Nome do mês (ex: "Maio"):', m.mes || '', 'Editar mês');
  if (nome === null) return;
  const ano = await uiPrompt('Ano (ex: 2026):', m.ano || new Date().getFullYear(), 'Editar mês');
  if (ano === null) return;
  m.mes = String(nome).trim();
  m.ano = parseInt(ano,10) || new Date().getFullYear();
  scheduleAutoSave();
  render();
}

async function excluirMesFixo(mesId){
  if (S.custosMensais.length <= 1) { await uiAlert('Não é possível excluir o único mês existente.'); return; }
  const idx = S.custosMensais.findIndex(x => String(x.id) === String(mesId));
  if (idx < 0) return;
  const m = S.custosMensais[idx];
  if (!await uiConfirm('Excluir o mês "' + (m.mes||'') + '/' + (m.ano||'') + '"?\n\nIsso remove todos os valores e comprovantes deste mês. Não pode ser desfeito.', 'Excluir mês', 'Excluir', 'Cancelar')) return;
  S.custosMensais.splice(idx, 1);
  S.fixoMesAtivo = String(S.custosMensais[0].id);
  showToast('✅ Mês excluído');
  scheduleAutoSave();
  render();
}

async function salvarCadastro(){
  const modal = document.getElementById('cad-modal');
  if(!modal) return;
  const kind = modal.dataset.kind;
  const tipo = modal.dataset.tipo;
  const idxStr = modal.dataset.idx;
  const idx = idxStr !== '' ? parseInt(idxStr) : null;
  const gv = id => { const el=document.getElementById(id); return el ? sanitize(el.value) : ''; };

  const nome = gv('cad_nome');
  if(!nome){ await uiAlert('Informe o nome/razão social.'); return; }

  if(kind === 'cliente'){
    const obj = { nome, usci:gv('cad_usci'), tel:gv('cad_tel'), email:gv('cad_email'), end:gv('cad_end') };
    if(idx !== null) {
      S.clientes[idx] = {...S.clientes[idx], ...obj};
      logAction('editar', 'CLIENTES', S.clientes[idx].id, nome);
    } else {
      obj.id = genId();
      S.clientes.push(obj);
      logAction('criar', 'CLIENTES', obj.id, nome);
    }
  } else {
    const obj = {
      nome, tipo,
      cnpj:gv('cad_cnpj'), ie:gv('cad_ie'), cep:gv('cad_cep'),
      email:gv('cad_email'), end:gv('cad_end'),
      banco:gv('cad_banco'), agencia:gv('cad_agencia'), conta:gv('cad_conta'),
      pix:gv('cad_pix')
    };
    if(idx !== null) {
      S.fornecedores[idx] = {...S.fornecedores[idx], ...obj};
      logAction('editar', 'FORNECEDORES', S.fornecedores[idx].id, tipo+': '+nome);
    } else {
      obj.id = genId();
      S.fornecedores.push(obj);
      logAction('criar', 'FORNECEDORES', obj.id, tipo+': '+nome);
    }
  }

  modal.remove();
  showToast();
  scheduleAutoSave();
  render();
}

function editarCadastro(kind, idx){
  const tipo = kind==='cliente' ? '' : S.fornecedores[idx].tipo;
  abrirModalCadastro(kind, tipo, idx);
}

async function excluirCadastro(kind, idx){
  const nome = kind==='cliente' ? S.clientes[idx]?.nome : S.fornecedores[idx]?.nome;
  if(!nome) return;

  // Detecta referências em processos, lançamentos e logística
  const refs = [];
  if (kind === 'cliente') {
    const procs = S.processos.filter(p => p.cliente === nome).map(p => p.id);
    if (procs.length) refs.push(procs.length+' processo(s): '+procs.slice(0,5).join(', ')+(procs.length>5?'...':''));
  } else {
    const procsLog = S.processos.filter(p => p.logTransportadora === nome).map(p => p.id);
    if (procsLog.length) refs.push(procsLog.length+' processo(s) como transportadora: '+procsLog.slice(0,5).join(', ')+(procsLog.length>5?'...':''));
  }
  const lancRefs = (S.lancamentos||[]).filter(l => l.empresa === nome).length;
  if (lancRefs) refs.push(lancRefs+' lançamento(s) com este nome');

  let msg = 'Excluir "'+nome+'"? Esta ação não pode ser desfeita.';
  if (refs.length) {
    msg += '\n\n⚠️ Atenção: este cadastro está referenciado em:\n• ' + refs.join('\n• ') + '\n\nOs nomes nos registros não serão removidos, mas perdem o vínculo com o cadastro.';
  }
  if(!await uiConfirm(msg, 'Excluir cadastro', 'Excluir mesmo assim', 'Cancelar')) return;

  if(kind==='cliente') {
    const removed = S.clientes[idx];
    S.clientes.splice(idx,1);
    logAction('excluir', 'CLIENTES', removed?.id, nome);
  } else {
    const removed = S.fornecedores[idx];
    S.fornecedores.splice(idx,1);
    logAction('excluir', 'FORNECEDORES', removed?.id, (removed?.tipo||'')+': '+nome);
  }
  showToast();
  scheduleAutoSave();
  render();
}

// LANÇAMENTOS FINANCEIROS / EXTRATO DE CAIXA
// ═══════════════════════════════════════════════════════════

// Mapas de configuração para entries automáticas (uma única fonte de verdade)
const PROCESS_COST_FIELDS = {
  custoMaritimo:'Frete Marítimo', custoFrete:'Frete Rodoviário',
  custoCertificado:'Certificado de Origem', custoArmazem:'Armazém',
  custoPorto:'Porto / Taxas', custoDespachante:'Despachante',
  custoServTerceiros:'Serviços de Terceiros', custoImpostos:'Impostos',
  custoProduto:'Produto'
};
const FIXED_COST_FIELDS = {
  contador:'Contador', aluguel:'Aluguel', software:'Software',
  internet:'Internet', telefone:'Telefone', impostos:'Impostos', outros:'Outros'
};

// Constrói TODAS as entries do sistema (manuais + automáticos de processo + automáticos de fixos)
// Esta é a ÚNICA fonte de verdade. Usado por Extrato, Por Processo e Custos Fixos.
// opts.filtroProcessoId: se passado, retorna só do processo X
// opts.filtroMesFixoId:  se passado, retorna só custos fixos do mês X (e nada mais)
// opts.tipo: 'processo' | 'fixo' | null (filtra origem)
function buildAllEntries(opts={}) {
  const ls = S.lancamentos || [];
  const manualOverride = new Set();
  ls.forEach(l => {
    if (l.vinculo === 'processo' && l.vinculoId && l.categoria) {
      manualOverride.add(`${l.vinculoId}::${l.categoria}`);
    }
  });

  const out = [];

  // Câmbio + custos de processos (automáticos)
  // Pula completamente se está filtrando por mês fixo (essa aba só mostra fixos)
  if (!opts.filtroMesFixoId && (!opts.tipo || opts.tipo === 'processo')) {
    S.processos.forEach(p => {
      if (opts.filtroProcessoId && p.id !== opts.filtroProcessoId) return;
      // Câmbio recebido
      if ((p.cambioReais||0) > 0 && !manualOverride.has(`${p.id}::Câmbio`)) {
        const docs = (p.docs && p.docs._lancCambio) ? p.docs._lancCambio : {};
        const legacy = p.cambioStatus || '';
        let status = hasComprovante(docs) ? 'Pago' : normalizeStatus(legacy);
        if (legacy === 'Cancelado') status = 'Cancelado';
        out.push({
          id: 'auto_cambio_' + p.id,
          _computed: true,
          _sourceProcessoId: p.id,
          _sourceField: 'cambioReais',
          tipo: 'Receita',
          descricao: 'Câmbio Recebido — ' + p.id,
          valor: p.cambioReais||0,
          data: p.cambioRecebimento || p.embarque || '',
          empresa: p.cliente||'',
          categoria: 'Câmbio',
          vinculo: 'processo',
          vinculoId: p.id,
          status, docs,
        });
      }
      // Custos do processo — SEMPRE inclui (mesmo zerados) quando filtrando por processo
      Object.entries(PROCESS_COST_FIELDS).forEach(([field, label]) => {
        const valor = p[field] || 0;
        if (manualOverride.has(`${p.id}::${label}`)) return;
        // Se NÃO está filtrando por processo, só mostra > 0 (para não poluir Extrato)
        if (!opts.filtroProcessoId && valor === 0) return;
        const docs = (p.docs && p.docs['_lanc_'+field]) ? p.docs['_lanc_'+field] : {};
        const legacy = p[field+'_status'] || '';
        let status = hasComprovante(docs) ? 'Pago' : normalizeStatus(legacy);
        if (legacy === 'Cancelado') status = 'Cancelado';
        const empresaCusto = (p.docs && p.docs._costEmpresa && p.docs._costEmpresa[field]) || '';
        // Data individual por custo (fallback: p.embarque legado)
        const dataCusto = (p.docs && p.docs._costData && p.docs._costData[field]) || '';
        out.push({
          id: 'auto_' + field + '_' + p.id,
          _computed: true,
          _sourceProcessoId: p.id,
          _sourceField: field,
          _sourceStatusField: field + '_status',
          tipo: 'Despesa',
          descricao: label + ' — ' + p.id,
          valor,
          data: dataCusto,
          empresa: empresaCusto,
          categoria: label,
          vinculo: 'processo',
          vinculoId: p.id,
          status, docs,
        });
      });
    });
  }

  // Custos fixos mensais (automáticos)
  if (!opts.tipo || opts.tipo === 'fixo') {
    (S.custosMensais || []).forEach((m, mi) => {
      const mesId = 'fixos_' + (m.id || m.mes || mi);
      if (opts.filtroMesFixoId && String(m.id) !== String(opts.filtroMesFixoId)) return;
      Object.entries(FIXED_COST_FIELDS).forEach(([field, label]) => {
        const valor = m[field] || 0;
        if (manualOverride.has(`${mesId}::Custo Fixo: ${label}`)) return;
        // Quando filtrando por mês fixo, SEMPRE mostra (mesmo zerado).
        // Quando NÃO filtra, só mostra > 0
        if (!opts.filtroMesFixoId && valor === 0) return;
        const docs = (m.docs && m.docs[field]) ? m.docs[field] : {};
        const status = hasComprovante(docs) ? 'Pago' : 'Em Aberto';
        // Data individual por custo fixo
        const dataFixa = (m.docs && m.docs._fixoData && m.docs._fixoData[field]) || '';
        out.push({
          id: 'auto_fixo_' + field + '_' + (m.id || mi),
          _computed: true,
          _sourceFixoField: field,
          _sourceFixoIdx: mi,
          tipo: 'Despesa',
          descricao: 'Custo Fixo: ' + label,
          valor,
          data: dataFixa,
          empresa: '',
          categoria: 'Custo Fixo: ' + label,
          vinculo: 'fixo',
          vinculoId: mesId,
          status, docs,
        });
      });
    });
  }

  // Lançamentos manuais (filtra por vinculação se filtros estão ativos)
  ls.forEach(l => {
    if (opts.filtroProcessoId) {
      if (l.vinculo !== 'processo' || l.vinculoId !== opts.filtroProcessoId) return;
    } else if (opts.filtroMesFixoId) {
      if (l.vinculo !== 'fixo' || String(l.vinculoId) !== ('fixos_' + opts.filtroMesFixoId)) return;
    } else if (opts.tipo === 'processo' && l.vinculo !== 'processo') {
      return;
    } else if (opts.tipo === 'fixo' && l.vinculo !== 'fixo') {
      return;
    }
    out.push(l);
  });

  // Ordena por data desc
  out.sort((a,b) => {
    const da = a.data ? String(a.data).split('/').reverse().join('') : '';
    const db = b.data ? String(b.data).split('/').reverse().join('') : '';
    return db.localeCompare(da);
  });

  return out;
}

function renderLancamentos(back, tabsHtml){
  // Usa a fonte de verdade unificada
  const allEntries = buildAllEntries();

  // ── Aplicação de filtros múltiplos ──
  // Filtros disponíveis em S.lancFiltros (objeto):
  //   tipo: 'todos' | 'Receita' | 'Despesa' | 'Transferência' | 'Reembolso' | '_manual' | '_auto'
  //   status: 'todos' | 'Em Aberto' | 'Pago' | 'Cancelado'
  //   mes: 'todos' | 'YYYY-MM' (formato ISO para ordenação)
  //   processo: 'todos' | <procId>
  if (!S.lancFiltros) S.lancFiltros = { tipo:'todos', status:'todos', mes:'todos', processo:'todos' };
  // Compatibilidade com S.lancFiltro antigo
  if (S.lancFiltro && S.lancFiltro !== 'todos') {
    if (['Receita','Despesa','Transferência','Reembolso','_manual'].includes(S.lancFiltro)) {
      S.lancFiltros.tipo = S.lancFiltro;
    }
    S.lancFiltro = null;
  }
  const flt = S.lancFiltros;

  // Extrair valores únicos para os dropdowns
  const dateToMesKey = d => {
    if (!d) return '';
    const s = String(d).trim();
    const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); // DD/MM/AAAA
    if (m1) return m1[3] + '-' + m1[2].padStart(2,'0');
    const m2 = s.match(/^(\w+)\/(\d{4})$/); // Mes/AAAA literal
    if (m2) {
      const mesesNum = {janeiro:'01',fevereiro:'02','março':'03',marco:'03',abril:'04',maio:'05',junho:'06',julho:'07',agosto:'08',setembro:'09',outubro:'10',novembro:'11',dezembro:'12'};
      const n = mesesNum[m2[1].toLowerCase()];
      if (n) return m2[2] + '-' + n;
    }
    const m3 = s.match(/^(\d{1,2})\/(\d{4})$/); // M/AAAA numérico
    if (m3) {
      const mm = parseInt(m3[1],10);
      if (mm >= 1 && mm <= 12) return m3[2] + '-' + String(mm).padStart(2,'0');
    }
    return '';
  };
  const mesKeyToLabel = k => {
    if (!k) return '—';
    const [y,m] = k.split('-');
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return (meses[parseInt(m,10)-1]||m) + '/' + y;
  };
  const mesesDisp = [...new Set(allEntries.map(l => dateToMesKey(l.data)).filter(Boolean))].sort().reverse();
  const processosDisp = [...new Set(allEntries.filter(l => l.vinculo==='processo').map(l => l.vinculoId))].sort();

  // Aplica filtros
  const lista = allEntries.filter(l => {
    if (flt.tipo !== 'todos') {
      if (flt.tipo === '_manual' && l._computed) return false;
      if (flt.tipo === '_auto' && !l._computed) return false;
      if (!['_manual','_auto'].includes(flt.tipo) && l.tipo !== flt.tipo) return false;
    }
    if (flt.status !== 'todos' && l.status !== flt.status) return false;
    if (flt.mes !== 'todos' && dateToMesKey(l.data) !== flt.mes) return false;
    if (flt.processo !== 'todos' && l.vinculoId !== flt.processo) return false;
    return true;
  });

  // Totals da LISTA filtrada
  const totalEntradas = lista.filter(l=>l.tipo==='Receita').reduce((a,l)=>a+(l.valor||0),0);
  const totalSaidas   = lista.filter(l=>l.tipo==='Despesa').reduce((a,l)=>a+(l.valor||0),0);
  const totalTransf   = lista.filter(l=>l.tipo==='Transferência').reduce((a,l)=>a+(l.valor||0),0);
  const totalReemb    = lista.filter(l=>l.tipo==='Reembolso').reduce((a,l)=>a+(l.valor||0),0);
  const totalEmAberto = lista.filter(l=>l.status==='Em Aberto').reduce((a,l)=>a+(l.valor||0),0);
  const totalPago     = lista.filter(l=>l.status==='Pago').reduce((a,l)=>a+(l.valor||0),0);
  const saldo = totalEntradas - totalSaidas + totalReemb;

  const tipoColor = {
    'Receita':'var(--green)','Despesa':'var(--red)',
    'Transferência':'var(--accent)','Reembolso':'var(--yellow)'
  };
  const tipoIcon = {
    'Receita':'💰','Despesa':'💸','Transferência':'🔄','Reembolso':'↩️'
  };
  const statusColor = STATUS_COLORS;
  const statusIcons = STATUS_ICONS;

async function salvarLancamento(idx){
  const getV = id => { const el=document.getElementById(id); return el ? sanitize(el.value) : ''; };
  const getTipo = () => { const el=document.getElementById('lf_tipo'); return el ? el.value : 'Despesa'; };
  const getUrl = id => { const el=document.getElementById(id); return el ? sanitizeUrl(el.value) : ''; };

  const vinculo = getV('lf_vinculo');
  const processoSel = getV('lf_vinculoProcesso');
  const vinculoId = vinculo==='processo' && processoSel ? processoSel :
                    vinculo==='cadastro' ? getV('lf_empresa') :
                    vinculo==='fixo' ? 'Custo Fixo Mensal' : '';

  const obj = {
    tipo: getTipo(),
    status: normalizeStatus(getV('lf_status')),
    descricao: getV('lf_descricao'),
    valor: parseFloat(document.getElementById('lf_valor')?.value)||0,
    data: getV('lf_data'),
    empresa: getV('lf_empresa'),
    categoria: getV('lf_categoria'),
    vinculo,
    vinculoId: sanitize(vinculoId),
    observacao: getV('lf_observacao'),
    docs:{
      comprovante: getUrl('lf_comprovante'),
      fatura: getUrl('lf_fatura'),
      nfe: getUrl('lf_nfe'),
      nfeChave: getV('lf_nfeChave'),
      outros: getUrl('lf_outros'),
    }
  };

  if(!obj.descricao){ await uiAlert('Informe a descrição do lançamento.'); return; }
  if(!obj.valor || obj.valor<=0){ await uiAlert('Informe um valor válido maior que zero.'); return; }

  if(!S.lancamentos) S.lancamentos = [];

  // idx aqui é o ID estável do lançamento (não o índice do array filtrado)
  // String vazia ou null = novo lançamento
  let isEdit = false;
  if(idx && idx !== 'null' && idx !== 'undefined'){
    const realIdx = S.lancamentos.findIndex(l => String(l.id) === String(idx));
    if(realIdx >= 0){
      obj.id = S.lancamentos[realIdx].id;
      S.lancamentos[realIdx] = obj;
      isEdit = true;
    } else {
      obj.id = genId();
      S.lancamentos.unshift(obj);
    }
  } else {
    obj.id = genId();
    S.lancamentos.unshift(obj);
  }
  logAction(isEdit?'editar':'criar', 'EXTRATO_CAIXA', obj.id,
    `${obj.tipo}: ${obj.descricao} (R$ ${obj.valor.toFixed(2)})`);

  document.getElementById('lanc-modal').remove();
  S.custosTab = 'lancamentos';
  showToast(); scheduleAutoSave(); render();
}

// Localiza um lançamento por ID, manual ou automático.
// Retorna {kind:'manual'|'auto-cambio'|'auto-cost'|'auto-fixo', entry, processo, field, fixo}
function findLancamento(id){
  // Manual primeiro
  const manual = (S.lancamentos||[]).find(l => String(l.id) === String(id));
  if(manual) return { kind:'manual', entry: manual };

  // Automático: id começa com 'auto_'
  const sid = String(id);
  if(sid.startsWith('auto_cambio_')){
    const procId = sid.replace('auto_cambio_','');
    const p = S.processos.find(x => x.id === procId);
    if(p) return { kind:'auto-cambio', processo: p, field: 'cambioReais' };
  }
  if(sid.startsWith('auto_fixo_')){
    // formato: auto_fixo_<field>_<idDoMes>
    const rest = sid.replace('auto_fixo_','');
    for(const field of Object.keys(FIXED_COST_FIELDS)){
      const prefix = field + '_';
      if(rest.startsWith(prefix)){
        const mesId = rest.slice(prefix.length);
        const m = (S.custosMensais||[]).find(x => String(x.id) === mesId)
              || (S.custosMensais||[])[parseInt(mesId,10)];
        if(m) return { kind:'auto-fixo', fixo: m, field };
      }
    }
  }
  if(sid.startsWith('auto_')){
    // auto_<field>_<procId>
    const rest = sid.replace('auto_','');
    for(const field of Object.keys(PROCESS_COST_FIELDS)){
      const prefix = field + '_';
      if(rest.startsWith(prefix)){
        const procId = rest.slice(prefix.length);
        const p = S.processos.find(x => x.id === procId);
        if(p) return { kind:'auto-cost', processo: p, field };
      }
    }
  }
  return null;
}

function editarLancamento(id){
  const f = findLancamento(id);
  if(!f){ showToast('⚠️ Lançamento não encontrado'); return; }
  if(f.kind === 'manual'){
    abrirModalLancamento(id);
    return;
  }
  // Automáticos abrem modal completo, mas sincronizados com o processo/fixo de origem
  abrirModalAutoLancamento(f);
}

async function excluirLancamento(id){
  const f = findLancamento(id);
  if(!f){ showToast('⚠️ Lançamento não encontrado'); return; }
  if(f.kind === 'manual'){
    if(!await uiConfirm('Excluir este lançamento manual?', 'Excluir lançamento', 'Excluir', 'Cancelar')) return;
    const idx = S.lancamentos.findIndex(l => String(l.id) === String(id));
    if(idx < 0) return;
    const removed = S.lancamentos[idx];
    S.lancamentos.splice(idx,1);
    logAction('excluir', 'EXTRATO_CAIXA', removed.id, (removed.tipo||'')+': '+(removed.descricao||'')+' R$ '+(removed.valor||0).toFixed(2));
    showToast('✅ Lançamento excluído'); scheduleAutoSave(); render();
    return;
  }
  // Câmbio é obrigatório em todo processo — não pode ser excluído, só editado
  if(f.kind === 'auto-cambio'){
    await uiAlert('Câmbio Recebido não pode ser excluído.\n\nTodo processo tem um câmbio obrigatório.\nSe ainda não recebeu, use ✏️ Editar e:\n  • Mude o status para "Em Aberto"\n  • Ou zere o valor recebido temporariamente.', '⚠️ Não é permitido');
    return;
  }
  // Auto-cost / auto-fixo: zera o valor (item some do extrato pois só aparece quando >0)
  let label = '', origem = '';
  if(f.kind === 'auto-cost'){
    label = (PROCESS_COST_FIELDS[f.field]||f.field) + ' — ' + f.processo.id;
    origem = 'O custo será zerado no processo ' + f.processo.id + ' (R$ ' + fmt(f.processo[f.field]) + ' → R$ 0,00).';
  } else if(f.kind === 'auto-fixo'){
    label = 'Custo Fixo: ' + (FIXED_COST_FIELDS[f.field]||f.field);
    origem = 'O custo fixo "' + (FIXED_COST_FIELDS[f.field]||f.field) + '" será zerado (R$ ' + fmt(f.fixo[f.field]) + ' → R$ 0,00).';
  }
  if(!await uiConfirm(`Excluir "${label}"?\n\n${origem}`, 'Confirmar exclusão', 'Excluir', 'Cancelar')) return;
  if(f.kind === 'auto-cost'){ f.processo[f.field] = 0; }
  else if(f.kind === 'auto-fixo'){ f.fixo[f.field] = 0; }
  showToast('✅ Zerado na origem'); scheduleAutoSave(); render();
}
