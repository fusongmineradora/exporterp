        // Agrupa todos os cadastros por tipo
        const grupos = {
          'Clientes': (S.clientes||[]).map(c => c.nome),
          'Transportadoras': (S.fornecedores||[]).filter(x=>x.tipo==='Transportadora').map(x=>x.nome),
          'Despachantes': (S.fornecedores||[]).filter(x=>x.tipo==='Despachante').map(x=>x.nome),
          'Agentes de Carga': (S.fornecedores||[]).filter(x=>x.tipo==='Agente').map(x=>x.nome),
          'Armazéns': (S.fornecedores||[]).filter(x=>x.tipo==='Armazém').map(x=>x.nome),
          'Serviços de Terceiros': (S.fornecedores||[]).filter(x=>x.tipo==='Serviço' || x.tipo==='Serviços' || x.tipo==='Servicos').map(x=>x.nome),
          'Outros': (S.fornecedores||[]).filter(x=>!['Transportadora','Despachante','Agente','Armazém','Serviço','Serviços','Servicos'].includes(x.tipo)).map(x=>x.nome),
        };
        // Verifica se empresaAtual existe em algum cadastro
        const existeNoCadastro = Object.values(grupos).flat().includes(empresaAtual);
        return `
        <div class="ig">
          <label class="lbl" style="display:flex;justify-content:space-between;align-items:center">
            <span>Transportadora / Fornecedor</span>
            <button type="button" onclick="abrirModalCadastro('fornecedor','Transportadora')" style="background:transparent;border:1px solid var(--accent2);color:var(--accent2);padding:2px 8px;border-radius:6px;font-size:9.5px;cursor:pointer;letter-spacing:0">+ Novo cadastro</button>
          </label>
          <select id="al_empresa">
            <option value="">— Selecione um cadastro —</option>
            ${empresaAtual && !existeNoCadastro ? `<option value="${escHtml(empresaAtual)}" selected>⚠️ ${escHtml(empresaAtual)} (não está no cadastro)</option>` : ''}
            ${Object.entries(grupos).map(([grupo, lista]) => {
              if (!lista.length) return '';
              return `<optgroup label="${grupo}">${lista.map(nome=>`<option value="${escHtml(nome)}" ${nome===empresaAtual?'selected':''}>${escHtml(nome)}</option>`).join('')}</optgroup>`;
            }).join('')}
          </select>
        </div>`;
      })() : ''}

      <div class="ig"><label class="lbl">Observação</label>
        <textarea id="al_observacao" rows="2" placeholder="Notas internas">${escHtml(observacaoAtual)}</textarea>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" onclick="document.getElementById('lanc-modal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarAutoLancamento()">💾 Salvar Alterações</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('al_valor')?.focus(), 100);
}

async function salvarAutoLancamento() {
  const modal = document.getElementById('lanc-modal');
  if (!modal) return;
  const kind = modal.dataset.autoKind;
  const field = modal.dataset.autoField;
  const procId = modal.dataset.autoProcId;

  const valor = parseFloat(document.getElementById('al_valor')?.value) || 0;
  const data = sanitize(document.getElementById('al_data')?.value || '');
  const status = sanitize(document.getElementById('al_status')?.value || '');
  const observacao = sanitize(document.getElementById('al_observacao')?.value || '');
  if (valor < 0) { await uiAlert('Valor não pode ser negativo.'); return; }

  if (kind === 'auto-cambio') {
    const p = S.processos.find(x => x.id === procId);
    if (!p) { showToast('⚠️ Processo não encontrado'); return; }
    p.cambioReais = valor;
    p.cambioRecebimento = data;
    p.cambioStatus = status;
    const banco = sanitize(document.getElementById('al_banco')?.value || '');
    if (banco) p.cambioBanco = banco;
    // Guarda observação no docs do processo para não duplicar coluna
    if (observacao) {
      if (!p.docs) p.docs = {};
      p.docs._cambioObs = observacao;
    }
  } else if (kind === 'auto-cost') {
    const p = S.processos.find(x => x.id === procId);
    if (!p) { showToast('⚠️ Processo não encontrado'); return; }
    p[field] = valor;
    p[field + '_status'] = status;
    const empresa = sanitize(document.getElementById('al_empresa')?.value || '');
    // Salva empresa POR CUSTO (cada custo tem seu próprio fornecedor)
    if (!p.docs) p.docs = {};
    if (!p.docs._costEmpresa) p.docs._costEmpresa = {};
    p.docs._costEmpresa[field] = empresa;
    // Salva data POR CUSTO no formato dd/mm/aaaa
    if (!p.docs._costData) p.docs._costData = {};
    p.docs._costData[field] = data;
    if (observacao) {
      if (!p.docs._costObs) p.docs._costObs = {};
      p.docs._costObs[field] = observacao;
    } else if (p.docs._costObs && p.docs._costObs[field]) {
      // Limpa se foi apagado
      delete p.docs._costObs[field];
    }
  } else if (kind === 'auto-fixo') {
    const fixoId = modal.dataset.autoFixoId;
    const m = (S.custosMensais||[]).find(x => String(x.id) === String(fixoId)) || (S.custosMensais||[])[0];
    if (!m) { showToast('⚠️ Custo fixo não encontrado'); return; }
    m[field] = valor;
    if (!m.docs) m.docs = {};
    // Salva data POR CUSTO FIXO individual no formato dd/mm/aaaa
    if (!m.docs._fixoData) m.docs._fixoData = {};
    m.docs._fixoData[field] = data;
    if (observacao) {
      if (!m.docs._obs) m.docs._obs = {};
      m.docs._obs[field] = observacao;
    }
  }

  modal.remove();
  scheduleAutoSave();
  showToast('✅ Alterações salvas');
  render();
}

function abrirDocLanc(id, docKey){
  const f = findLancamento(id);
  if(!f) return;
  // Para manuais, abre direto se já tem doc
  if(f.kind === 'manual'){
    const l = f.entry;
    const hasDoc = l.docs && l.docs[docKey] && String(l.docs[docKey]).length>0;
    if(hasDoc){ window.open(sanitizeUrl(l.docs[docKey]),'_blank','noopener,noreferrer'); return; }
    abrirModalLancamento(id);
    return;
  }
  // Para automáticos, abre o modal de upload diretamente
  // Os docs ficam guardados em:
  //   processos[].docs._lancCambio[docKey]                   (câmbio do processo)
  //   processos[].docs._lanc_<field>[docKey]                 (custos do processo)
  //   custosMensais[0].docs.<field>[docKey]                  (custos fixos)
  abrirUploadLanc(id, docKey);
}

// PDF dispatcher
function gerarPDF(id) {
  const map = {
    'embarque':       gerarRelatorioEmbarque,
    'mensal':         gerarRelatorioMensal,
    'financeiro':     gerarRelatorioFinanceiro,
    'cambio':         gerarExtratoCambio,
    'contabilidade':  gerarRelatorioContabilidade,
  };
  const fn = map[id];
  if (!fn) { showToast('⚠️ Relatório não encontrado'); return; }
  if (!window.jspdf) { showToast('⚠️ Biblioteca PDF não carregou. Recarregue a página.'); return; }
  try { fn(); } catch(e) { showToast('⚠️ Erro ao gerar PDF: ' + e.message); }
}

function initPDF(){
  if(!window.jspdf){
    showToast('⚠️ Biblioteca PDF não carregou. Recarregue a página.');
    throw new Error('jsPDF not loaded');
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  // White background for readability
  doc.setFillColor(255,255,255);
  doc.rect(0,0,210,297,'F');
  // Header bar
  doc.setFillColor(14,165,233);
  doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('Fu Song - Gestão de Exportação',14,14);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text(new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}),196,14,'right');
  doc.setDrawColor(226,232,240);
  doc.setLineWidth(0.3);
  return doc;
}

function pdfHeader(doc,title,subtitle){
  doc.setTextColor(15,23,42);
  doc.setFontSize(16);
  doc.setFont('helvetica','bold');
  doc.text(title,14,34);
  doc.setTextColor(100,116,139);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text(subtitle,14,41);
  doc.text('Gerado em: '+new Date().toLocaleString('pt-BR'),196,41,'right');
  doc.setDrawColor(226,232,240);
  doc.line(14,45,196,45);
  return 52;
}

function pdfSection(doc,label,y){
  // Section background
  doc.setFillColor(240,249,255);
  doc.rect(14,y-4,182,8,'F');
  doc.setTextColor(14,165,233);
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');
  doc.text(label.toUpperCase(),16,y+1);
  doc.setDrawColor(186,230,253);
  doc.line(14,y+4,196,y+4);
  return y+12;
}

function pdfRow(doc,label,val,y,color=[51,65,85]){
  doc.setTextColor(71,85,105);
  doc.setFontSize(8.5);
  doc.setFont('helvetica','normal');
  // Truncate label if too long to avoid overlap with value
  const maxLabelWidth = 100;
  const labelStr = String(label);
  const valStr = String(val);
  doc.text(labelStr, 16, y, {maxWidth: maxLabelWidth});
  doc.setTextColor(...color);
  doc.setFont('helvetica','bold');
  doc.text(valStr, 160,y,'right');
  doc.setDrawColor(241,245,249);
  doc.line(14,y+2,196,y+2);
  return y+7;
}

function pdfTotal(doc,label,val,y,color=[14,165,233]){
  doc.setFillColor(248,250,252);
  doc.rect(14,y-4,182,10,'F');
  doc.setTextColor(15,23,42);
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');
  doc.text(label,16,y+2);
  doc.setTextColor(...color);
  doc.text(String(val),194,y+2,'right');
  return y+14;
}

function pdfNewPage(doc){
  doc.addPage();
  doc.setFillColor(14,165,233);
  doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('Fu Song - Gestão de Exportação',14,14);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text('continuação...',196,14,'right');
  return 30;
}

function gerarRelatorioEmbarque(id=null){
  const ps = id ? S.processos.filter(p=>p.id===id) : S.processos;
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório de Embarques','Detalhamento de embarques realizados');

  ps.forEach((p,i)=>{
    if(y>250){ y=pdfNewPage(doc); }
    y = pdfSection(doc, `Embarque ${p.embarque||i+1} · Processo ${p.id}`, y);
    y = pdfRow(doc,'Processo',p.id,y,[14,165,233]);
    y = pdfRow(doc,'Produto / Commodity',p.produto||'—',y);
    y = pdfRow(doc,'Porto de Origem (POL)',p.pol||'—',y);
    y = pdfRow(doc,'Container(s)',(p.containers&&p.containers.length>1?p.containers.join(', '):p.container)||'—',y,[14,165,233]);
    y = pdfRow(doc,'Quantidade de Containers',p.qtdContainer||'1',y);
    y = pdfRow(doc,'Nº Booking',p.booking||'—',y,[14,165,233]);
    y = pdfRow(doc,'Porto de Destino (POD)',p.pod||'—',y);
    y = pdfRow(doc,'Saída do Navio',p.saida||'—',y);
    y = pdfRow(doc,'Dead Line Carga',p.deadlineCarga||'—',y);
    y = pdfRow(doc,'Dead Line Draft',p.deadlineDraft||'—',y);
    y = pdfRow(doc,'Companhia Marítima',p.companhia||'—',y);
    y = pdfRow(doc,'Status',p.status||'—',y,[22,197,160]);
    y = pdfRow(doc,'Peso',p.peso||'—',y);
    y = pdfRow(doc,'Cliente / Consignee',p.cliente||'—',y);
    y += 4;
  });

  doc.save(`Embarques_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function gerarRelatorioMensal(){
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório Mensal de Custos','Custos variáveis por processo e fixos mensais');

  y = pdfSection(doc,'CUSTOS VARIÁVEIS POR PROCESSO', y);
  S.processos.forEach(p=>{
    if(y>240){ y=pdfNewPage(doc); }
    y = pdfSection(doc, p.id+' — '+(p.produto||''), y);
    const items = [
      ['Marítimo',p.custoMaritimo,p.custoMaritimo_status],
      ['Frete Rodoviário',p.custoFrete,p.custoFrete_status],
      ['Certificado de Origem',p.custoCertificado,p.custoCertificado_status],
      ['Armazém',p.custoArmazem,p.custoArmazem_status],
      ['Porto / Taxas',p.custoPorto,p.custoPorto_status],
      ['Despachante',p.custoDespachante,p.custoDespachante_status],
      ['Serviços de Terceiros',p.custoServTerceiros,p.custoServTerceiros_status],
      ['Impostos',p.custoImpostos,p.custoImpostos_status],
      ['Custo do Produto',p.custoProduto,p.custoProduto_status],
    ];
    items.forEach(([l,v,st])=>{
      if((v||0)>0){
        const stNorm = normalizeStatus(st||'Em Aberto');
        const statusColor = stNorm==='Pago'?[22,163,74]:stNorm==='Cancelado'?[100,116,139]:[245,158,11];
        y = pdfRow(doc, l+' ('+stNorm+')', 'R$ '+fmt(v), y, statusColor);
      }
    });
    y = pdfTotal(doc,'Total do Processo','R$ '+fmt(tc(p)),y,[14,165,233]);
  });

  // CUSTOS FIXOS — itera TODOS os meses cadastrados
  if(y>230){ y=pdfNewPage(doc); }
  y = pdfSection(doc,'CUSTOS FIXOS MENSAIS', y);
  let totalFixosGeral = 0;
  (S.custosMensais||[]).forEach(m => {
    if(y>240){ y=pdfNewPage(doc); }
    const mesLabel = (m.mes||'—') + (m.ano?'/'+m.ano:'');
    y = pdfSection(doc, mesLabel, y);
    [['Contador',m.contador],['Aluguel Coworking',m.aluguel],['Software',m.software],
     ['Internet',m.internet],['Telefone',m.telefone],['Impostos',m.impostos],['Outros',m.outros]
    ].forEach(([l,v])=>{ if((v||0)>0) y=pdfRow(doc,l,'R$ '+fmt(v),y,[251,146,60]); });
    const totalMes = tcm(m);
    y = pdfTotal(doc,'Total '+mesLabel,'R$ '+fmt(totalMes),y,[251,146,60]);
    totalFixosGeral += totalMes;
  });
  if((S.custosMensais||[]).length > 1) {
    y = pdfTotal(doc,'TOTAL GERAL FIXOS','R$ '+fmt(totalFixosGeral),y,[251,146,60]);
  }

  doc.save(`Custos_Mensal_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  showToast();
}

function gerarRelatorioFinanceiro(){
  const doc = initPDF();
  let y = pdfHeader(doc,'Relatório Financeiro','Balanço por processo e consolidado geral');

  S.processos.forEach(p=>{
    if(y>240){ y=pdfNewPage(doc); }
    y = pdfSection(doc, p.id+' — '+(p.produto||''), y);
    y = pdfRow(doc,'Cliente',p.cliente||'—',y);
    y = pdfRow(doc,'Saída',p.saida||'—',y);
    y = pdfRow(doc,'Invoice','USD '+fmt(p.cambioInvoice),y,[14,165,233]);
    y = pdfRow(doc,'Taxa Cambial','R$ '+(p.cambioTaxa||0).toFixed(4),y);
    y = pdfRow(doc,'Receita (R$)','R$ '+fmt(p.cambioReais),y,[22,163,74]);

function makeFabDraggable() {
  const fab = document.getElementById('dash-fab');
  if (!fab || fab._draggable) return;
  fab._draggable = true;

  let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

  function getPos() {
    const rect = fab.getBoundingClientRect();
    return { left: rect.left, top: rect.top };
  }

  function startDrag(cx, cy) {
    dragging = false;
    const pos = getPos();
    // Convert to fixed top/left removing bottom
    fab.style.bottom = 'auto';
    fab.style.right = 'auto';
    fab.style.top = pos.top + 'px';
    fab.style.left = pos.left + 'px';
    origLeft = pos.left;
    origTop = pos.top;
    startX = cx;
    startY = cy;
    fab.style.transition = 'none';
    fab.style.cursor = 'grabbing';
  }

  function moveDrag(cx, cy) {
    const dx = cx - startX;
    const dy = cy - startY;
    if (!dragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) dragging = true;
    if (!dragging) return;
    const maxLeft = window.innerWidth - fab.offsetWidth - 4;
    const maxTop = window.innerHeight - fab.offsetHeight - 4;
    const newLeft = Math.max(4, Math.min(maxLeft, origLeft + dx));
    const newTop = Math.max(4, Math.min(maxTop, origTop + dy));
    fab.style.left = newLeft + 'px';
    fab.style.top = newTop + 'px';
    fab.style.bottom = 'auto';
    fab.style.right = 'auto';
    try { localStorage.setItem('fab-pos', JSON.stringify({left: newLeft, top: newTop})); } catch(e){}
  }

  function endDrag() {
    fab.style.cursor = 'grab';
    fab.style.transition = 'box-shadow 0.2s';
    if (!dragging) nav('dashboard');
    dragging = false;
  }

  // Mouse
  fab.addEventListener('mousedown', e => {
    e.preventDefault();
    startDrag(e.clientX, e.clientY);
    const mm = e2 => moveDrag(e2.clientX, e2.clientY);
    const mu = () => { endDrag(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });

  // Touch - full XY support for mobile and tablet
  fab.addEventListener('touchstart', e => {
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
    const tm = e2 => {
      if (e2.cancelable) e2.preventDefault();
      const t2 = e2.touches[0];
      moveDrag(t2.clientX, t2.clientY);
    };
    const tu = () => {
      endDrag();
      window.removeEventListener('touchmove', tm);
      window.removeEventListener('touchend', tu);
    };
    window.addEventListener('touchmove', tm, {passive: false});
    window.addEventListener('touchend', tu);
  }, {passive: true});

  // Restore saved position
  try {
    const saved = JSON.parse(localStorage.getItem('fab-pos'));
    if (saved && saved.left >= 0 && saved.top >= 0) {
      fab.style.bottom = 'auto';
      fab.style.right = 'auto';
      fab.style.left = Math.min(saved.left, window.innerWidth - 100) + 'px';
      fab.style.top = Math.min(saved.top, window.innerHeight - 50) + 'px';
    }
  } catch(e) {}
}

let _tokenClient = null; // singleton

function getTokenClient() {

// Restaura token do sessionStorage se ainda for válido (>2min de vida)
function restoreTokenFromStorage() {
  try {
    const raw = sessionStorage.getItem('erp-gtoken');
    if (!raw) return false;
    const t = JSON.parse(raw);
    if (t.expiry && t.expiry > Date.now() + 120000) {
      window._sheetsToken = t.token;
      window._sheetsTokenExpiry = t.expiry;
      return true;
    }
    sessionStorage.removeItem('erp-gtoken');
  } catch(e) {}
  return false;
}

// Persiste token na sessionStorage
function persistToken() {
  try {

      token: window._sheetsToken,
      expiry: window._sheetsTokenExpiry,
    }));
  } catch(e) {}
}

// Get current OAuth token from Google Identity Services
// modes:
//  - silent (default): tenta renovar sem pop-up se já consentido
//  - 'consent': força tela de consentimento (primeiro acesso ou reautorização explícita)
function getAccessToken(forceConsent=false) {
  return new Promise((resolve, reject) => {
    const user = sessionStorage.getItem('erp-user');
    if (!user) { reject(new Error('Not logged in')); return; }
    // Token cacheado e válido?
    if (!forceConsent && window._sheetsToken && window._sheetsTokenExpiry > Date.now() + 60000) {
      resolve(window._sheetsToken);
      return;
    }
    // Tenta restaurar do storage
    if (!forceConsent && restoreTokenFromStorage()) {
      resolve(window._sheetsToken);
      return;
    }
    const client = getTokenClient();
    if (!client) {
      reject(new Error('Google Identity Services não carregou. Aguarde e tente novamente.'));
      return;
    }
    client.callback = (resp) => {
      if (resp.error) { reject(new Error(resp.error)); return; }
      window._sheetsToken = resp.access_token;
      window._sheetsTokenExpiry = Date.now() + (resp.expires_in * 1000) - 60000;
      window._driveConsented = true;
      try { sessionStorage.setItem('drive-consented', '1'); } catch(e) {}
      persistToken();
      // Agenda auto-renovação silenciosa antes de expirar
      scheduleTokenRenewal();
      resolve(resp.access_token);
    };
    client.error_callback = (err) => {
      reject(new Error(err.message || err.type || 'OAuth error'));
    };
    // Se nunca consentiu OU pediu force, mostra a tela de permissão
    // Caso contrário, renovação silenciosa (prompt='' = sem pop-up se já autorizado)
    const alreadyConsented = sessionStorage.getItem('drive-consented') === '1' || window._driveConsented;
    const promptMode = (forceConsent || !alreadyConsented) ? 'consent' : '';
    try {
      client.requestAccessToken({ prompt: promptMode });
    } catch(e) {
      reject(e);
    }
  });
}

// Agenda renovação silenciosa antes do token expirar
let _renewTimer = null;
function scheduleTokenRenewal() {
  clearTimeout(_renewTimer);
  if (!window._sheetsTokenExpiry) return;
  // Renova 2 minutos antes de expirar
  const renewIn = Math.max(60000, window._sheetsTokenExpiry - Date.now() - 120000);
  _renewTimer = setTimeout(async () => {
    // Silent renewal — só tenta se já consentiu antes (prompt='')
    const alreadyConsented = sessionStorage.getItem('drive-consented') === '1';
    if (!alreadyConsented) {
      // Não consentiu ainda — não tenta renovar (evita pop-up bloqueado)
      mostrarBannerConexaoDrive();
      return;
    }
    try {
      const client = getTokenClient();
      if (!client) return;
      await new Promise((resolve, reject) => {
        client.callback = (resp) => {
          if (resp.error) { reject(new Error(resp.error)); return; }
          window._sheetsToken = resp.access_token;
          window._sheetsTokenExpiry = Date.now() + (resp.expires_in * 1000) - 60000;
          persistToken();
          scheduleTokenRenewal();
          resolve();
        };
        client.error_callback = (err) => reject(new Error(err.message || 'OAuth error'));
        // Renovação SEM pop-up (prompt='')
        client.requestAccessToken({ prompt: '' });
      });
    } catch(e) {
      // Falhou renovação — mostra banner pro usuário clicar
      mostrarBannerConexaoDrive();
    }
  }, renewIn);
}

// Generic Sheets API call
async function sheetsAPI(method, endpoint, body=null, _retry=false) {
  const token = await getAccessToken();
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SHEETS_API + endpoint, opts);
  if (!res.ok) {
    // #20 — Token expirado/inválido: tenta renovar uma vez e refazer
    if ((res.status === 401 || res.status === 403) && !_retry) {
      window._sheetsToken = null;
      window._sheetsTokenExpiry = 0;
      try { sessionStorage.removeItem('erp-gtoken'); } catch(e) {}
      // Refaz com novo token
      return sheetsAPI(method, endpoint, body, true);
    }
    const err = await res.json().catch(()=>({}));
    const msg = err.error?.message || 'Sheets API error ' + res.status;
    const e = new Error(msg);
    e.status = res.status;
    throw e;
  }
  return res.json();
}

// ── SETUP: Create sheets if they don't exist ──────────────
async function setupSheets() {
  try {
    const info = await sheetsAPI('GET', `/${SHEET_ID}?fields=sheets.properties.title,sheets.properties.sheetId`);
    const existing = info.sheets.map(s => s.properties.title);

    // Migração: renomear LANCAMENTOS -> EXTRATO_CAIXA se existir e EXTRATO_CAIXA não
    if (existing.includes('LANCAMENTOS') && !existing.includes('EXTRATO_CAIXA')) {
      const sheet = info.sheets.find(s => s.properties.title === 'LANCAMENTOS');
      if (sheet) {
        try {
          await sheetsAPI('POST', `/${SHEET_ID}:batchUpdate`, {
            requests: [{
              updateSheetProperties: {
                properties: { sheetId: sheet.properties.sheetId, title: 'EXTRATO_CAIXA' },
                fields: 'title'
              }
            }]
          });
          // Atualizar lista local
          const idx = existing.indexOf('LANCAMENTOS');
          if (idx >= 0) existing[idx] = 'EXTRATO_CAIXA';
        } catch(e) {
          console.warn('Falha ao renomear LANCAMENTOS:', e.message);
        }
      }
    }

    const needed = Object.keys(SHEET_SCHEMA);  // J — vem do schema centralizado
    const toCreate = needed.filter(n => !existing.includes(n));

    if (toCreate.length > 0) {
      await sheetsAPI('POST', `/${SHEET_ID}:batchUpdate`, {
        requests: toCreate.map(title => ({addSheet: {properties: {title}}}))
      });
    }

    // J — escreve headers a partir do schema centralizado (não duplica mais)
    const updates = Object.entries(SHEET_SCHEMA).map(([sheet, cols]) => ({
      range: `${sheet}!A1`,
      values: [cols]
    }));
    await sheetsAPI('POST', `/${SHEET_ID}/values:batchUpdate`, {
      valueInputOption: 'RAW',
      data: updates
    });
    // Sheets setup complete
  } catch(e) {
    console.warn('Setup sheets error:', e.message);
  }
}

// ── LOAD: Read all data from Sheets ──────────────────────
async function loadFromSheets() {
  try {
    showSyncIndicator('Carregando dados...');
    const ranges = ['PROCESSOS', 'CLIENTES', 'FORNECEDORES', 'EXTRATO_CAIXA', 'CUSTOS_FIXOS'];
    const res = await sheetsAPI('GET',
      `/${SHEET_ID}/values:batchGet?ranges=${ranges.join('&ranges=')}&majorDimension=ROWS`
    );

    // #C — Validação de schema: compara headers da planilha com os esperados.
    // Se não bater, avisa o usuário e usa apenas os campos que reconhece (não corrompe).
    const schemaIssues = [];
    res.valueRanges.forEach((vr, idx) => {
      const sheetName = ranges[idx];
      const expected = SHEET_SCHEMA[sheetName];
      if (!expected || !vr?.values?.length) return;
      const actual = vr.values[0];
      // Detecta colunas faltando ou em ordem diferente
      const missing = expected.filter(h => !actual.includes(h));
      const extra = actual.filter(h => !expected.includes(h));
      if (missing.length || extra.length) {
        schemaIssues.push({sheet: sheetName, missing, extra});
      }
    });
    if (schemaIssues.length > 0) {
      // Log no console + toast discreto. Não bloqueia o load.
      console.warn('Schema mismatch detectado:', schemaIssues);
      const summary = schemaIssues.map(s =>
        `${s.sheet}: ${s.missing.length?'faltam '+s.missing.length:''}${s.missing.length&&s.extra.length?', ':''}${s.extra.length?'extras '+s.extra.length:''}`
      ).join(' | ');
      showToast('⚠️ Schema divergente: ' + summary);
    }

    // Parser usa headers REAIS da planilha (preserva flexibilidade)
    const parse = (vr) => {
      if (!vr?.values || vr.values.length < 2) return [];
      const headers = vr.values[0];
      return vr.values.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = row[i] || ''; });
        return obj;
      });
    };
    const [proc, cli, forn, lanc, fixos] = res.valueRanges.map(parse);
    // Parse numeric fields in processos
    proc.forEach(p => {
      ['custoMaritimo','custoFrete','custoCertificado','custoArmazem','custoPorto',
       'custoDespachante','custoServTerceiros','custoImpostos','custoProduto',
       'cambioInvoice','cambioTaxa','cambioReais','cambioIOF','cambioSpread','cambioRecebido'
      ].forEach(k => { p[k] = parseFloat(p[k]) || 0; });
      if (p.containers && typeof p.containers === 'string') {
        try {
          const parsed = JSON.parse(p.containers);
          p.containers = Array.isArray(parsed) && parsed.length > 0 ? parsed : [p.container||''];
        } catch(e) { p.containers = [p.container||'']; }
      } else if (!Array.isArray(p.containers) || p.containers.length === 0) {
        p.containers = [p.container||''];
      }
      if (p.docs && typeof p.docs === 'string') {
        try { p.docs = JSON.parse(p.docs); } catch(e) { p.docs = {}; }
      } else if (!p.docs) { p.docs = {}; }
    });
    lanc.forEach(l => {
      l.valor = parseFloat(l.valor) || 0;
      if (l.docs && typeof l.docs === 'string') {
        try { l.docs = JSON.parse(l.docs); } catch(e) { l.docs = {}; }
      } else if (!l.docs) { l.docs = {}; }
    });
    fixos.forEach(m => {
      ['contador','aluguel','software','internet','telefone','impostos','outros'
      ].forEach(k => { m[k] = parseFloat(m[k]) || 0; });
      if (m.docs && typeof m.docs === 'string') {
        try { m.docs = JSON.parse(m.docs); } catch(e) { m.docs = {}; }
      } else if (!m.docs) { m.docs = {}; }
    });
    if (proc.length > 0) S.processos = proc;
    if (cli.length > 0) S.clientes = cli;
    if (forn.length > 0) S.fornecedores = forn;
    if (lanc.length > 0) S.lancamentos = lanc;
    if (fixos.length > 0) S.custosMensais = fixos;
    // Re-vincular S.sub ao objeto recém-carregado (mesmo ID, novo objeto em memória)
    if (S.sub && S.sub.id) {
      const refreshed = S.processos.find(p => p.id === S.sub.id);
      if (refreshed) S.sub = refreshed;
    }
    hideSyncIndicator();
    render();
  } catch(e) {
    hideSyncIndicator();
    console.warn('Load error:', e.message);
  }
}

// ── SAVE: Write data to Sheets ────────────────────────────
async function saveToSheets() {
  try {
    showSyncIndicator('Salvando...');
    const toRow = (obj, headers) => headers.map(h => {
      const v = obj[h];
      if (h === 'containers' && Array.isArray(v)) return JSON.stringify(v);
      if (h === 'docs' && typeof v === 'object' && v !== null) return JSON.stringify(v);
      return v === null || v === undefined ? '' : String(v);
    });

    const headerData = SHEET_SCHEMA;  // J — usa o schema centralizado
    const data = [
      { sheet: 'PROCESSOS', items: S.processos },
      { sheet: 'CLIENTES', items: S.clientes },
      { sheet: 'FORNECEDORES', items: S.fornecedores },
      { sheet: 'EXTRATO_CAIXA', items: S.lancamentos || [] },
      { sheet: 'CUSTOS_FIXOS', items: S.custosMensais || [] },
    ];

    // FIX: limpa todo o conteúdo das abas ANTES de escrever
    // (evita linhas-fantasma quando o array tem MENOS itens que antes — ex: após excluir)
    const clearRanges = data.map(({sheet}) => `${sheet}!A1:ZZ10000`);
    try {
      await sheetsAPI('POST', `/${SHEET_ID}/values:batchClear`, {
        ranges: clearRanges
      });
    } catch(clearErr) {
      // Se o clear falhar, ainda tenta gravar (não é fatal — pode ser primeira vez)
      console.warn('Clear ranges error (não fatal):', clearErr.message);
    }

    // Agora escreve os dados (cabeçalho + linhas)
    const updates = data.map(({sheet, items}) => {
      const headers = headerData[sheet];
      const rows = [headers, ...items.map(item => toRow(item, headers))];
      return { range: `${sheet}!A1`, values: rows };
    });

    await sheetsAPI('POST', `/${SHEET_ID}/values:batchUpdate`, {
      valueInputOption: 'RAW',
      data: updates
    });
    hideSyncIndicator();
    showToast('✅ Dados salvos no Google Sheets');
  } catch(e) {
    hideSyncIndicator();
    showToast('⚠️ Erro ao salvar: ' + e.message);
  }
}

// #F — Audit log. Escreve assincronamente na aba LOG. Fila local para não bloquear UI.
// Append-only: usa values:append (não rewrite). Falha silenciosa se rede cair.
const _logQueue = [];
let _logFlushTimer = null;
function logAction(acao, tabela, registroId, resumo='') {
  try {
    const user = JSON.parse(sessionStorage.getItem('erp-user')||'{}');
    _logQueue.push([
      new Date().toISOString(),
      user.email || '?',
      acao,         // criar | editar | excluir
      tabela,       // PROCESSOS | CLIENTES | ...
      String(registroId||''),
      String(resumo||'').slice(0, 500)  // limita tamanho
    ]);
    clearTimeout(_logFlushTimer);
    _logFlushTimer = setTimeout(_flushLogQueue, 3000);
  } catch(e) {}
}
async function _flushLogQueue() {
  if (_logQueue.length === 0 || !window._sheetsToken) return;
  const batch = _logQueue.splice(0, _logQueue.length);
  try {
    await sheetsAPI('POST',
      `/${SHEET_ID}/values/LOG!A:F:append?valueInputOption=RAW`,
      { values: batch }
    );
  } catch(e) {
    // Re-enfileira em caso de falha (até 100 entradas, depois descarta)
    if (_logQueue.length < 100) _logQueue.unshift(...batch);
    console.warn('Log flush error:', e.message);
  }
}

function scheduleAutoSave() {
  // #A — Mirror local imediato (síncrono, não espera debounce nem rede)
  // Protege contra: queda de internet, browser fechado antes do save remoto, falha do Sheets
  try {
    const backup = {
      processos: S.processos, clientes: S.clientes, fornecedores: S.fornecedores,
      lancamentos: S.lancamentos, custosMensais: S.custosMensais,
      savedAt: Date.now()
    };
    localStorage.setItem('erp-local-backup', JSON.stringify(backup));
  } catch(e) {
    // Quota excedida? Tenta limpar backup antigo e seguir em frente
    try { localStorage.removeItem('erp-local-backup'); } catch(_) {}
  }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    if (sessionStorage.getItem('erp-user') && window._sheetsToken) {
      saveToSheets();
    }
  }, 2000); // 2 second debounce
}

// #A — Detecta se há backup local mais recente que o que veio do Sheets
// Chamado após loadFromSheets. Se backup local tem dados E é mais novo, oferece restaurar.
async function checkLocalBackup() {
  try {
    const raw = localStorage.getItem('erp-local-backup');
    if (!raw) return;
    const backup = JSON.parse(raw);
    if (!backup || !backup.savedAt) return;

    // Conta itens no backup vs estado atual
    const backupCount = (backup.processos?.length||0) + (backup.lancamentos?.length||0);
    const currentCount = (S.processos?.length||0) + (S.lancamentos?.length||0);

    // Oferece restaurar se:
    //  • backup tem dados E
    //  • backup tem MAIS itens que o atual (sinal de perda no remoto)
    //  • backup foi salvo nas últimas 24h (mais antigo provavelmente desatualizado)
    const idade = Date.now() - backup.savedAt;
    const dentroPrazo = idade < 24 * 60 * 60 * 1000;

    if (backupCount > currentCount && dentroPrazo) {
      const minutos = Math.round(idade / 60000);
      const ok = await uiConfirm(
        `Foi detectado um backup local com mais dados que a planilha:\n\n` +
        `• Backup local: ${backup.processos?.length||0} processos, ${backup.lancamentos?.length||0} lançamentos\n` +
        `• Planilha atual: ${S.processos?.length||0} processos, ${S.lancamentos?.length||0} lançamentos\n\n` +
        `Salvo há ${minutos} minuto(s). Restaurar do backup?`,
        'Backup local disponível',
        'Restaurar backup',
        'Manter atual'
      );
      if (ok) {
        if (backup.processos?.length) S.processos = backup.processos;
        if (backup.clientes?.length) S.clientes = backup.clientes;
        if (backup.fornecedores?.length) S.fornecedores = backup.fornecedores;
        if (backup.lancamentos?.length) S.lancamentos = backup.lancamentos;
        if (backup.custosMensais?.length) S.custosMensais = backup.custosMensais;
        showToast('✅ Backup restaurado — salvando na planilha');
        if (window._sheetsToken) saveToSheets();
        render();
      }
    }
  } catch(e) {
    console.warn('checkLocalBackup:', e.message);
  }
}

// GOOGLE DRIVE INTEGRATION

const DRIVE_API = 'https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3';
const ROOT_FOLDER_NAME = 'Fu Song ERP';

async function driveAPI(method, endpoint, body=null, params='') {
  const token = await getAccessToken();
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const url = DRIVE_API + endpoint + (params ? '?' + params : '');
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || 'Drive API error ' + res.status);
  }
  return res.json();
}

// Get or create a folder by name inside a parent
async function getOrCreateFolder(name, parentId=null) {
  // Drive API: nome em query precisa de aspas simples escapadas como \'
  const safeName = String(name).replace(/'/g, "\\'");
  const q = `mimeType='application/vnd.google-apps.folder' and name='${safeName}' and trashed=false`
    + (parentId ? ` and '${parentId}' in parents` : '');
  const search = await driveAPI('GET', '/files', null,
    `q=${encodeURIComponent(q)}&fields=files(id,name)&spaces=drive`);
  if (search.files && search.files.length > 0) {
    return search.files[0].id;
  }
  // Create folder
  const meta = { name, mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) meta.parents = [parentId];
  const created = await driveAPI('POST', '/files', meta);
  return created.id;
}

// Ensure root folder exists, cache ID
async function getRootFolderId() {
  if (window._rootFolderId) return window._rootFolderId;
  const id = await getOrCreateFolder(ROOT_FOLDER_NAME);
  window._rootFolderId = id;
  // Save to CONFIG sheet
  saveConfig('drive_root_folder_id', id).catch(()=>{});  // #21 — não-fatal
  return id;
}

// Create process folder structure
async function criarPastaProcesso(processo) {
  try {
    showSyncIndicator('Criando pasta no Drive...');
    const rootId = await getRootFolderId();
    // Folder name: FS260096 — Cliente
    const clienteShort = (processo.cliente||'').split(' ').slice(0,3).join(' ');
    const folderName = `${processo.id}${clienteShort ? ' — ' + clienteShort : ''}`;
    const folderId = await getOrCreateFolder(folderName, rootId);
    const folderUrl = `https://drive.google.com/drive/folders/${folderId}`;

    // Save folder ID and URL to processo
    const p = S.processos.find(x => x.id === processo.id);
    if (p) {
      if (!p.docs) p.docs = {};
      p.docs._folderId = folderId;
      p.docs._folderUrl = folderUrl;
    }

    hideSyncIndicator();
    scheduleAutoSave();
    return { folderId, folderUrl };
  } catch(e) {
    hideSyncIndicator();
    const msg = e.message || '';
    if(msg.includes('popup') || msg.includes('access_denied') || msg.includes('consent')) {
      showToast('🔑 Autorize o acesso ao Drive na janela que abrir');
    } else {
      showToast('⚠️ Erro Drive: ' + msg.substring(0,50));
    }
    return null;
  }
}

// Save config value to CONFIG sheet
async function saveConfig(key, value) {
  try {
    const token = await getAccessToken();
    // Append to CONFIG sheet
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/CONFIG!A:B:append?valueInputOption=RAW`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[key, value]] })
    });
  } catch(e) {}
}

// Open process Drive folder
async function abrirPastaProcesso(p) {
  // If we have folder URL cached, open it directly
  if (p.docs && p.docs._folderUrl && p.docs._folderUrl.startsWith('https://')) {
    window.open(sanitizeUrl(p.docs._folderUrl), '_blank', 'noopener,noreferrer');
    return;
  }
  // If we have folderId, construct URL and cache it
  if (p.docs && p.docs._folderId && p.docs._folderId.length > 5) {
    const url = 'https://drive.google.com/drive/folders/' + p.docs._folderId;
    p.docs._folderUrl = url;
    scheduleAutoSave();
    window.open(sanitizeUrl(url), '_blank', 'noopener,noreferrer');
    return;
  }
  // Need to create/find folder — requires Drive token
  if (!window._sheetsToken) {
    showToast('🔑 Aguarde... conectando ao Google Drive');
    try {
      await getAccessToken();
    } catch(e) {
      showToast('⚠️ Autorize o acesso ao Drive primeiro');
      return;
    }
  }
  showToast('📂 Buscando/criando pasta no Drive...');
  try {
    const result = await criarPastaProcesso(p);
    if (result && result.folderUrl) {
      // Force immediate save so folderId persists
      await saveToSheets();
      window.open(sanitizeUrl(result.folderUrl), '_blank', 'noopener,noreferrer');
      render();
    } else {
      // Last resort: open Drive search
      showToast('🔍 Abrindo Drive com busca por ' + p.id);
      setTimeout(()=>window.open('https://drive.google.com/drive/search?q=' + encodeURIComponent(p.id), '_blank', 'noopener,noreferrer'), 300);
    }
  } catch(e) {
    showToast('🔍 Abrindo Drive com busca por ' + p.id);
    setTimeout(()=>window.open('https://drive.google.com/drive/search?q=' + encodeURIComponent(p.id), '_blank', 'noopener,noreferrer'), 300);
  }
}

// Upload file to Drive folder and return file URL
async function uploadFileToDrive(file, processId, docKey='') {
  try {
    showSyncIndicator('Fazendo upload: ' + file.name + '...');
    const token = await getAccessToken();

    // Get or create process folder first
    let folderId = null;
    const p = S.processos.find(x => x.id === processId);
    if (p && p.docs && p.docs._folderId) {
      folderId = p.docs._folderId;
    } else if (p) {
      const result = await criarPastaProcesso(p);
      if (result) folderId = result.folderId;
    }

    // If this is a cost receipt (custo_), create/use a subfolder
    let uploadFolderId = folderId;
    if (docKey && docKey.startsWith('custo_') && folderId) {
      try {
        uploadFolderId = await getOrCreateFolder('📎 Comprovantes de Custos', folderId);
      } catch(e) { uploadFolderId = folderId; }
    }

    // Upload file metadata + content
    const metadata = {
      name: file.name,
      parents: uploadFolderId ? [uploadFolderId] : (folderId ? [folderId] : [])
    };

    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    form.append('file', file);

    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
      {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: form
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Upload failed');
    }

    const fileData = await res.json();
    
    // Make file accessible (anyone with link can view)
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}/permissions`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });

    hideSyncIndicator();
    return { id: fileData.id, name: fileData.name, url: fileData.webViewLink };

  } catch(e) {
    hideSyncIndicator();
    showToast('⚠️ Erro no upload: ' + e.message);
    return null;
  }
}

async function processUploadFile(file, processId, docKey, docLabel) {
  if (!file) return;
  const prog = document.getElementById('upload-progress');
  if (prog) { prog.style.display = 'block'; prog.textContent = '⏳ Fazendo upload de ' + file.name + '...'; }

  const result = await uploadFileToDrive(file, processId, docKey);
  if (result) {
    // Save URL to processo docs
    const p = S.processos.find(x => x.id === processId);
    if (p) {
      if (!p.docs) p.docs = {};
      p.docs[docKey] = result.url;
    }
    // Salvar imediatamente para não perder o documento ao navegar
    if (window._sheetsToken) {
      await saveToSheets();
    } else {
      scheduleAutoSave();
    }

    if (prog) { prog.style.display = 'block'; prog.innerHTML = '✅ Upload concluído! <a href="' + sanitizeUrl(result.url) + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent2)">Ver arquivo ↗</a>'; }

    // Update link input
    const linkInput = document.getElementById('doc-link-input');
    if (linkInput) linkInput.value = result.url;

    showToast('✅ ' + file.name + ' enviado para o Drive!');
    setTimeout(() => { document.getElementById('upload-modal')?.remove(); render(); }, 1500);
  }
}

// Decide a pasta Drive destino para um doc de lançamento e faz o upload
async function uploadFileForLanc(file, id, docKey) {
  const f = findLancamento(id);
  if (!f) throw new Error('Lançamento não encontrado');
  try {
    showSyncIndicator('Fazendo upload: ' + file.name + '...');
    const token = await getAccessToken();
    const rootId = await getRootFolderId();

    // Determinar pasta de destino
    let destFolderId = null;
    if (f.kind === 'manual') {
      const l = f.entry;
      // Se está vinculado a processo, usar pasta do processo / Comprovantes
      if (l.vinculo === 'processo' && l.vinculoId) {
        const p = S.processos.find(x => x.id === l.vinculoId);
        if (p) {
          let procFolderId = p.docs?._folderId;
          if (!procFolderId) {
            const r = await criarPastaProcesso(p);
            procFolderId = r?.folderId;
          }
          if (procFolderId) destFolderId = await getOrCreateFolder('Comprovantes', procFolderId);
        }
      }
      // Se não tem processo: pasta raiz / Comprovantes <Mês/Ano>
      if (!destFolderId) {
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        let mesAno = 'Sem Data';
        if (l.data && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(l.data)) {
          const [,mm,yy] = l.data.split('/');
          mesAno = (meses[parseInt(mm,10)-1] || mm) + '/' + yy;
        }
        destFolderId = await getOrCreateFolder('Comprovantes ' + mesAno, rootId);
      }
    } else if (f.kind === 'auto-cambio' || f.kind === 'auto-cost') {
      const p = f.processo;
      let procFolderId = p.docs?._folderId;
      if (!procFolderId) {
        const r = await criarPastaProcesso(p);
        procFolderId = r?.folderId;
      }
      if (procFolderId) destFolderId = await getOrCreateFolder('Comprovantes', procFolderId);
    } else if (f.kind === 'auto-fixo') {
      const m = f.fixo;
      const mesAno = (m.mes||'Sem Data') + (m.ano?'/'+m.ano:'');
      destFolderId = await getOrCreateFolder('Comprovantes Fixos ' + mesAno, rootId);
    }

    const metadata = { name: file.name };
    if (destFolderId) metadata.parents = [destFolderId];

    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    form.append('file', file);

    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
      { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: form }
    );
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || 'Upload failed');
    }
    const data = await res.json();

    // Tornar acessível por link
    await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });

    hideSyncIndicator();
    return data.webViewLink;
  } catch(e) {
    hideSyncIndicator();
    throw e;
  }
}

// Persiste o URL do doc no local correto (manual, processo ou fixo)
// Side effect: se URL é válido e docKey é 'comprovante', marca o lançamento como Pago
function setLancDocUrl(id, docKey, url){
  const f = findLancamento(id);
  if (!f) return false;
  const isAdding = url && String(url).length > 0;

  if (f.kind === 'manual') {
    if (!f.entry.docs) f.entry.docs = {};
    f.entry.docs[docKey] = url;
    // Auto-Pago: se adicionou comprovante, status vira Pago
    if (isAdding && docKey === 'comprovante' && f.entry.status !== 'Cancelado') {
      f.entry.status = 'Pago';
    }
  } else if (f.kind === 'auto-cambio') {
    if (!f.processo.docs) f.processo.docs = {};
    if (!f.processo.docs._lancCambio) f.processo.docs._lancCambio = {};
    f.processo.docs._lancCambio[docKey] = url;
    if (isAdding && docKey === 'comprovante' && f.processo.cambioStatus !== 'Cancelado') {
      f.processo.cambioStatus = 'Pago';
    }
  } else if (f.kind === 'auto-cost') {
    if (!f.processo.docs) f.processo.docs = {};
    const k = '_lanc_' + f.field;
    if (!f.processo.docs[k]) f.processo.docs[k] = {};
    f.processo.docs[k][docKey] = url;
    if (isAdding && docKey === 'comprovante' && f.processo[f.field+'_status'] !== 'Cancelado') {
      f.processo[f.field+'_status'] = 'Pago';
    }
  } else if (f.kind === 'auto-fixo') {
    if (!f.fixo.docs) f.fixo.docs = {};
    if (!f.fixo.docs[f.field]) f.fixo.docs[f.field] = {};
    f.fixo.docs[f.field][docKey] = url;
    // Para fixos não há campo de status separado — a presença do comprovante já é a verdade
  }
  return true;
}

// Auto-update process status based on dates
// Mapeamento correto baseado nos campos do processo:
//  logEmbarque -> data de saída da origem (coletado)
//  logChegada  -> data de chegada no armazém
//  logPorto    -> data de entrada no porto
//  saida       -> data de saída do navio
// Status automático baseado nas datas do processo
//
// Etapas (em ordem cronológica):
//   1. A Coletar         → ainda não tem data de embarque na origem (ou data futura)
//   2. Indo para Armazém → passou de logEmbarque (saiu da origem)
//   3. No Armazém        → passou de logChegada (chegou no armazém)
//   4. No Porto          → passou de logPorto (entrou no porto)
//   5. Embarcado         → passou de saida (navio zarpou)
//
// Datas de referência:
//   p.logEmbarque  = data de coleta/saída da origem (ex: Araçuaí/MG)
//   p.logChegada   = data de chegada no armazém (ex: Oziris/Cubatão)
//   p.logPorto     = data de entrada no porto (ex: Santos)
//   p.saida        = data de saída do navio (POL → POD)
function autoUpdateStatus() {
  const today = new Date(); today.setHours(0,0,0,0);
  const parseDate = s => {
    if(!s) return null;
    const parts = String(s).split('/');
    if(parts.length !== 3) return null;
    const [d,m,y] = parts.map(x => parseInt(x,10));
    if(!d || !m || !y) return null;
    const dt = new Date(y, m-1, d);
    return isNaN(dt.getTime()) ? null : dt;
  };
  S.processos.forEach(p => {
    // Preserva status terminais que devem ser definidos manualmente
    if (p.status === 'No Destino' || p.status === 'Concluído' || p.status === 'Cancelado') return;

    const dtOrigem  = parseDate(p.logEmbarque); // saída da origem (coleta)
    const dtArmazem = parseDate(p.logChegada);  // chegada no armazém
    const dtPorto   = parseDate(p.logPorto);    // entrada no porto
    const dtNavio   = parseDate(p.saida);       // saída do navio

    // Aplica do mais avançado para o mais inicial (primeiro match vence)
    if (dtNavio && today >= dtNavio) {
      p.status = 'Embarcado';
    } else if (dtPorto && today >= dtPorto) {
      p.status = 'No Porto';
    } else if (dtArmazem && today >= dtArmazem) {
      p.status = 'No Armazém';
    } else if (dtOrigem && today >= dtOrigem) {
      p.status = 'Indo para Armazém';
    } else {
      p.status = 'A Coletar';
    }

    // Auto cambio status — usa SEMPRE o conjunto unificado (Em Aberto / Pago / Cancelado)
    // Não sobrescreve se já está Cancelado (intervenção manual)
    if (p.cambioStatus !== 'Cancelado') {
      if (p.cambioRecebimento && (p.cambioReais||0) > 0) {
        p.cambioStatus = 'Pago';
      } else {
        p.cambioStatus = 'Em Aberto';
      }
    }
  });
}

// INIT
// ═══════════════════════════════════════════════════════════
// Check if already logged in
// Security: prevent clickjacking via JS (CSP frame-ancestors already blocks, this is defense-in-depth)
try {
  if(window.top !== window.self){
    window.top.location = window.self.location;
  }
} catch(e) {
  // SecurityError in cross-origin iframe — CSP will block it anyway
}

// Security: warn if not HTTPS in production
if(location.protocol !== 'file:' && location.protocol !== 'https:' && location.hostname !== 'localhost'){
  // production environment must use HTTPS
}
// ── ESC fecha qualquer modal aberto ──
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  // Ordem de prioridade: modais customizados ui-modal já tratam ESC sozinhos
  const ids = ['lanc-modal','cad-modal','upload-modal','doc-modal'];
  for (const id of ids) {
    const m = document.getElementById(id);
    if (m) { m.remove(); return; }
  }
});

// #A — Aviso ao fechar/recarregar a aba se houver save pendente
// (a confirmação nativa do browser dá chance de o usuário cancelar e deixar o auto-save terminar)
window.addEventListener('beforeunload', e => {
  if (_saveTimer) {
    // Há mudanças não sincronizadas — backup local protege, mas avisa
    e.preventDefault();
    e.returnValue = 'Mudanças não foram sincronizadas com o Google Sheets ainda. Esperar mais alguns segundos antes de sair?';
    return e.returnValue;
  }
});

if (!checkSession()) {
  // Show login screen - Google GIS will handle it
  applyTheme();
}
</script>
